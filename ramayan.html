<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#ff9a9e 0%,
#fad0c4 20%,
#fbc2eb 40%,
#a18cd1 60%,
#84fab0 80%,
#8fd3f4 100%
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:22px;

overflow-x:hidden;

position:relative;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:

radial-gradient(circle at top left,
rgba(255,255,255,0.35),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(255,255,255,0.25),
transparent 30%),

radial-gradient(circle at center,
rgba(255,255,255,0.15),
transparent 45%);

z-index:-2;

animation:glow 8s infinite alternate;

}

@keyframes glow{

0%{
transform:scale(1);
}

100%{
transform:scale(1.08);
}

}

body::after{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:
radial-gradient(rgba(255,255,255,0.35) 2px, transparent 2px);

background-size:35px 35px;

opacity:0.25;

z-index:-1;

animation:particles 20s linear infinite;

}

@keyframes particles{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-90px);
}

}

.header{

text-align:center;

font-size:46px;

font-weight:900;

margin-bottom:38px;

animation:headerFloat 3s infinite alternate;

}

.ramayan-text{

background:
linear-gradient(
90deg,
#fff176,
#ffeb3b,
#ff9800,
#ff5722,
#ffd54f
);

background-size:300% 300%;

animation:ramGlow 6s linear infinite;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 10px rgba(255,152,0,0.8),
0 0 20px rgba(255,87,34,0.7),
0 0 30px rgba(255,193,7,0.5),
0 6px 18px rgba(0,0,0,0.5);

}

@keyframes ramGlow{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

@keyframes headerFloat{

0%{
transform:translateY(0px);
}

100%{
transform:translateY(-5px);
}

}

.episode-card{

background:
linear-gradient(
145deg,
rgba(255,255,255,0.22),
rgba(255,255,255,0.08)
);

backdrop-filter:blur(20px);

border:2px solid rgba(255,255,255,0.25);

border-radius:34px;

padding:24px;

margin-bottom:30px;

box-shadow:

0 20px 45px rgba(0,0,0,0.28),

inset 0 2px 5px rgba(255,255,255,0.3),

0 0 25px rgba(255,255,255,0.1);

transition:0.45s;

position:relative;

overflow:hidden;

}

.episode-card:hover{

transform:
translateY(-8px)
scale(1.02);

}

.ep-title{

font-size:28px;

font-weight:900;

color:#4e342e;

margin-bottom:14px;

line-height:1.4;

}

.ep-desc{

font-size:17px;

font-weight:700;

line-height:1.9;

color:#5d4037;

margin-bottom:20px;

}

.highlight{

color:#bf360c;

font-weight:900;

background:
linear-gradient(
90deg,
#fff176,
#ffcc80
);

padding:2px 9px;

border-radius:10px;

}

audio{

width:100%;

border-radius:50px;

margin-bottom:15px;

background:
linear-gradient(
90deg,
#ff6f00,
#ff1744
);

}

.coming{

margin-top:15px;

padding:16px;

border-radius:18px;

font-size:16px;

font-weight:900;

text-align:center;

background:
linear-gradient(
90deg,
#ff9800,
#ff5722

color:white;

}

<div class="ep-desc">
${ep.desc}
</div>

ep.audio.length > 0

ep.audio.map(link => `

<audio controls>
<source src="${link}" type="audio/mpeg">
</audio>

`).join("")

:

`

<div class="coming">

</div>

`

<script>

const allAudios = document.querySelectorAll("audio");

allAudios.forEach(audio => {

audio.addEventListener("play", () => {

allAudios.forEach(otherAudio => {

if(otherAudio !== audio){

otherAudio.pause();
otherAudio.currentTime = 0;

}

});

});

});

</script>
