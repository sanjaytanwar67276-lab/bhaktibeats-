<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>नाम से जानें भविष्य - श्री भक्ति सागर</title>
  <style>
    body { background-color: #FFF3E0; font-family: sans-serif; padding: 20px; text-align: center; margin: 0; }
    .header { background: #D84315; color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 20px; }
    input { width: 85%; padding: 15px; border-radius: 10px; border: 2px solid #D84315; font-size: 18px; margin-bottom: 15px; outline: none; text-align: center; }
    .check-btn { background: #D84315; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .result-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 25px; display: none; text-align: left; border: 1px solid #D84315; }
    .label { color: #E65100; font-weight: bold; font-size: 16px; display: block; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
    p { font-size: 15px; color: #333; line-height: 1.5; margin: 8px 0; }
    .highlight-box { background: #FFF8E1; padding: 12px; border-left: 4px solid #D84315; border-radius: 5px; color: #444; }
    .audio-btn { background: #4CAF50; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">🚩 नाम से जानें अपना भविष्य</div>
  
  <p style="font-size: 14px; color: #D84315; margin-bottom: 10px;">अपना नाम <b>अंग्रेजी (English)</b> में लिखें</p>
  <input type="text" id="userName" placeholder="जैसे: Sanjay Tanwar">
  <br>
  <button class="check-btn" onclick="analyzeName()">प्रामाणिक जानकारी देखें</button>

  <div id="result" class="result-card">
    <h2 style="text-align:center; color:#D84315; margin-top:0;" id="res-name"></h2>
    
    <span class="label">आपकी राशि (Rashi):</span>
    <p id="res-rashi" style="font-weight:bold; color:#D84315;"></p>

    <span class="label">🌟 आज का विशेष राशिफल:</span>
    <p id="res-rashifal" class="highlight-box">गणना की जा रही है...</p>

    <span class="label">शुभ अंक और रंग (Lucky Details):</span>
    <p id="res-lucky">लोड हो रहा है...</p>

    <span class="label">इष्ट देव और स्वभाव (Personality):</span>
    <p id="res-nature">गणना जारी है...</p>

    <button class="audio-btn" onclick="speakResult()">🔊 आवाज़ में सुनें</button>
  </div>

  <script>
    const API_KEY = "Ak-844baffa3c91095379da74ce4bc1c15e3a078152";

    async function analyzeName() {
      let name = document.getElementById("userName").value.trim();
      if(!name) { alert("कृपया नाम लिखें!"); return; }

      let firstChar = name.toUpperCase().charAt(0);
      let rashiData = getRashiFromLetter(firstChar);
      
      document.getElementById("res-name").innerText = name;
      document.getElementById("res-rashi").innerText = rashiData.name;
      document.getElementById("result").style.display = "block";

      // API Call for Authentic Data
      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
      
      try {
        let url = `https://api.vedicastroapi.com/v3/json/prediction/daily_moon?zodiac=${rashiData.id}&date=${dateStr}&api_key=${API_KEY}&lang=hi&tz=5.5`;
        let res = await fetch(url);
        let data = await res.json();

        if(data.response) {
          document.getElementById("res-rashifal").innerText = data.response.bot_response;
          // स्वभाव और शुभ विवरण API के आधार पर
          document.getElementById("res-lucky").innerText = `आज का भाग्यशाली अंक ${data.response.lucky_number || '7'} और शुभ रंग ${data.response.lucky_color || 'पीला'} है।`;
          document.getElementById("res-nature").innerText = `आपकी राशि के अनुसार आपके इष्ट देव ${rashiData.god} हैं। आज का ग्रह गोचर बताता है कि ${data.response.bot_response.split('.')[0]}।`;
        }
      } catch(e) {
        document.getElementById("res-rashifal").innerText = "नेटवर्क की समस्या, कृपया पुनः प्रयास करें।";
      }
    }

    function getRashiFromLetter(char) {
      const mapping = {
        'A': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"}, 'L': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"},
        'B': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"}, 'V': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"},
        'K': {id: 3, name: "मिथुन (Gemini)", god: "गणेश जी"}, 'D': {id: 4, name: "कर्क (Cancer)", god: "महादेव"},
        'M': {id: 5, name: "सिंह (Leo)", god: "सूर्य देव"}, 'T': {id: 5, name: "सिंह (Leo)", god: "सूर्य देव"},
        'P': {id: 6, name: "कन्या (Virgo)", god: "विष्णु जी"}, 'R': {id: 7, name: "तुला (Libra)", god: "माता दुर्गा"},
        'N': {id: 8, name: "वृश्चिक (Scorpio)", god: "हनुमान जी"}, 'Y': {id: 8, name: "वृश्चिक (Scorpio)", god: "हनुमान जी"},
        'F': {id: 9, name: "धनु (Sagittarius)", god: "श्री कृष्ण"}, 'J': {id: 10, name: "मकर (Capricorn)", god: "शनि देव"},
        'G': {id: 11, name: "कुंभ (Aquarius)", god: "शनि देव"}, 'S': {id: 11, name: "कुंभ (Aquarius)", god: "शनि देव"},
        'Z': {id: 12, name: "मीन (Pisces)", god: "विष्णु जी"}
      };
      return mapping[char] || {id: 1, name: "मेष (Aries)", god: "हनुमान जी"};
    }

    function speakResult() {
      window.speechSynthesis.cancel();
      let text = document.getElementById("result").innerText;
      let msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'hi-IN';
      window.speechSynthesis.speak(msg);
    }
  </script>
</body>
</html>
