<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>नाम से जानें भविष्य - श्री भक्ति सागर</title>
  <style>
    body { background-color: #FFF3E0; font-family: sans-serif; padding: 20px; text-align: center; margin: 0; }
    .header { background: #D84315; color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 20px; }
    input { width: 85%; padding: 15px; border-radius: 10px; border: 2px solid #D84315; font-size: 18px; margin-bottom: 15px; outline: none; text-align: center; }
    .check-btn { background: #D84315; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .result-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 25px; display: none; text-align: left; border: 1px solid #D84315; }
    .label { color: #E65100; font-weight: bold; font-size: 16px; display: block; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
    p { font-size: 15px; color: #333; line-height: 1.5; margin: 8px 0; }
    .highlight-box { background: #FFF8E1; padding: 12px; border-left: 4px solid #D84315; border-radius: 5px; color: #444; font-weight: 500; }
    .karma-box { background: #FFCCBC; padding: 12px; border-radius: 8px; margin-top: 25px; text-align: center; border: 1px dashed #D84315; }
    .karma-text { font-size: 15px; color: #BF360C; font-weight: bold; font-style: italic; }
    .audio-btn { background: #4CAF50; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">🚩 नाम से जानें अपना भविष्य</div>
  <p style="font-size: 14px; color: #D84315; margin-bottom: 10px;">अपना नाम <b>अंग्रेजी (English)</b> में लिखें</p>
  <input type="text" id="userName" placeholder="जैसे: Sanjay Tanwar" autocomplete="off">
  <button class="check-btn" onclick="analyzeName()">प्रामाणिक जानकारी देखें</button>

  <div id="result" class="result-card">
    <h2 style="text-align:center; color:#D84315; margin-top:0;" id="res-name"></h2>
    <span class="label">आपकी राशि (Rashi):</span>
    <p id="res-rashi" style="font-weight:bold; color:#D84315;"></p>
    <span class="label">🌟 18 जून 2026 का विशेष राशिफल:</span>
    <p id="res-rashifal" class="highlight-box"></p>
    <span class="label">शुभ अंक और स्वभाव:</span>
    <p id="res-lucky-nature"></p>

    <div class="karma-box">
      <span class="karma-text">"याद रखें: आपकी सच्ची मेहनत और ईश्वर की भक्ति इन सभी भविष्यवाणियों को बदल सकती है। 🙏"</span>
    </div>
    <button class="audio-btn" onclick="speakResult()">🔊 आवाज़ में सुनें</button>
  </div>

  <script>
    // 18 June 2026 Ka Authentic Data
    function getRashifal(zodiacId) {
      const data = {
          1: "मेष: आज का दिन विशेष है, पराक्रम बढ़ेगा और साहस से बिगड़े काम बनेंगे। अटके हुए सरकारी कार्य पूर्ण हो सकते हैं। उपाय: हनुमान जी को सिंदूर चढ़ाएं।",
          2: "वृषभ: आज धन लाभ के प्रबल योग हैं, लेकिन विलासिता पर खर्च बढ़ सकता है। परिवार के साथ सामंजस्य अच्छा रहेगा। उपाय: मिश्री का भोग लगाएं।",
          3: "मिथुन: बौद्धिक कार्यों में सफलता मिलेगी, आज आप कोई बड़ा समझौता (deal) कर सकते हैं। लेखन और संचार से जुड़े लोगों के लिए शुभ। उपाय: गणेश जी को दूर्वा अर्पित करें।",
          4: "कर्क: आज मन में चंचलता रहेगी, निर्णय लेने में सावधानी बरतें। जल संबंधी कार्यों में लाभ मिल सकता है। उपाय: शिव जी का जलाभिषेक करें।",
          5: "सिंह: आज आपका आत्मविश्वास शिखर पर होगा, रुके हुए काम गति पकड़ेंगे। पिता से सहयोग मिलेगा। उपाय: सूर्य देव को अर्घ्य दें।",
          6: "कन्या: आज शत्रुओं पर विजय प्राप्त होगी, लेकिन स्वास्थ्य में थकान का अनुभव हो सकता है। दिन मिला-जुला रहेगा। उपाय: पक्षियों को दाना डालें।",
          7: "तुला: आज साझीदारी (Partnership) में लाभ होगा। प्रेम संबंधों में प्रगाढ़ता आएगी। आज का दिन निवेश के लिए उत्तम है। उपाय: माँ लक्ष्मी की आराधना करें।",
          8: "वृश्चिक: आज आप काफी ऊर्जावान महसूस करेंगे, लेकिन गुस्से पर नियंत्रण रखना होगा। अचानक धन लाभ की संभावना है। उपाय: हनुमान चालीसा का पाठ करें।",
          9: "धनु: आज भाग्योदय का दिन है। लंबे समय से अटके कार्यों में गति आएगी। गुरु का आशीर्वाद बना रहेगा। उपाय: पीली वस्तुओं का दान करें।",
          10: "मकर: आज कार्यक्षेत्र में काम का बोझ बढ़ सकता है, धैर्य बनाए रखें। शाम तक कोई अच्छी खबर सुनने को मिलेगी। उपाय: शनि देव के सामने दीपक जलाएं।",
          11: "कुंभ: आज आय के नए स्रोत खुलेंगे, मित्रों से सहयोग प्राप्त होगा। सामाजिक प्रतिष्ठा में वृद्धि होगी। उपाय: पीपल के नीचे सरसों के तेल का दीपक जलाएं।",
          12: "मीन: आज का दिन आध्यात्मिक और मानसिक शांति वाला है। बेवजह के खर्चों पर लगाम लगाने की जरूरत है। उपाय: विष्णु जी को पीले पुष्प अर्पित करें।"
      };
      return data[zodiacId] || "आज का दिन आपके लिए मंगलमय हो।";
    }

    function analyzeName() {
      let name = document.getElementById("userName").value.trim();
      if(!name) { alert("कृपया नाम लिखें!"); return; }

      let fullName = name.toUpperCase();
      let firstChar = fullName.charAt(0);
      
      const mapping = {
        'A': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"}, 'L': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"}, 'E': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"}, 'I': {id: 1, name: "मेष (Aries)", god: "हनुमान जी"},
        'B': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"}, 'V': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"}, 'U': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"}, 'W': {id: 2, name: "वृषभ (Taurus)", god: "भगवान शिव"},
        'K': {id: 3, name: "मिथुन (Gemini)", god: "गणेश जी"}, 'Q': {id: 3, name: "मिथुन (Gemini)", god: "गणेश जी"},
        'D': {id: 4, name: "कर्क (Cancer)", god: "महादेव"}, 'H': {id: 4, name: "कर्क (Cancer)", god: "महादेव"},
        'M': {id: 5, name: "सिंह (Leo)", god: "सूर्य देव"}, 'T': {id: 5, name: "सिंह (Leo)", god: "सूर्य देव"},
        'P': {id: 6, name: "कन्या (Virgo)", god: "विष्णु जी"},
        'R': {id: 7, name: "तुला (Libra)", god: "माता दुर्गा"},
        'N': {id: 8, name: "वृश्चिक (Scorpio)", god: "हनुमान जी"}, 'Y': {id: 8, name: "वृश्चिक (Scorpio)", god: "हनुमान जी"},
        'F': {id: 9, name: "धनु (Sagittarius)", god: "श्री कृष्ण"},
        'J': {id: 10, name: "मकर (Capricorn)", god: "शनि देव"},
        'G': {id: 11, name: "कुंभ (Aquarius)", god: "शनि देव"}, 'S': {id: 11, name: "कुंभ (Aquarius)", god: "शनि देव"},
        'Z': {id: 12, name: "मीन (Pisces)", god: "विष्णु जी"}
      };

      let rashiData = mapping[firstChar] || {id: 1, name: "मेष (Aries)", god: "हनुमान जी"};
      
      document.getElementById("res-name").innerText = name;
      document.getElementById("res-rashi").innerText = rashiData.name;
      document.getElementById("res-rashifal").innerText = getRashifal(rashiData.id);
      document.getElementById("res-lucky-nature").innerText = `आपके इष्ट देव ${rashiData.god} हैं। आज आपका दिन बहुत ही सकारात्मक रहेगा।`;
      document.getElementById("result").style.display = "block";
    }

    function speakResult() {
      let text = "नाम " + document.getElementById("res-name").innerText + ". " +
                 "राशि " + document.getElementById("res-rashi").innerText + ". " +
                 document.getElementById("res-rashifal").innerText;
      let msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'hi-IN';
      window.speechSynthesis.speak(msg);
    }
  </script>
</body>
</html>
