<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>श्री भक्ति सागर - प्रामाणिक भविष्यफल</title>
  <style>
    body { background-color: #FFF3E0; font-family: sans-serif; padding: 20px; text-align: center; margin: 0; }
    .header { background: #D84315; color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 20px; }
    input { width: 85%; padding: 15px; border-radius: 10px; border: 2px solid #D84315; font-size: 18px; margin-bottom: 15px; outline: none; text-align: center; }
    .check-btn { background: #D84315; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .result-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 25px; display: none; text-align: left; border: 1px solid #D84315; }
    .label { color: #E65100; font-weight: bold; font-size: 16px; display: block; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
    p { font-size: 15px; color: #333; line-height: 1.6; margin: 8px 0; }
    .highlight-box { background: #FFF8E1; padding: 15px; border-left: 4px solid #D84315; border-radius: 5px; color: #444; font-size: 15px; line-height: 1.7; }
    .audio-btn { background: #4CAF50; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">🚩 श्री भक्ति सागर</div>
  <p style="font-size: 14px; color: #D84315; margin-bottom: 10px;">अपना नाम <b>अंग्रेजी (English)</b> में लिखें</p>
  <input type="text" id="userName" placeholder="जैसे: Sanjay" autocomplete="off">
  <button class="check-btn" onclick="analyzeName()">प्रामाणिक जानकारी देखें</button>

  <div id="result" class="result-card">
    <h2 style="text-align:center; color:#D84315; margin-top:0;" id="res-name"></h2>
    
    <span class="label">आपकी राशि और इष्ट देव:</span>
    <p id="res-rashi" style="font-weight:bold; color:#D84315;"></p>

    <span class="label">🌟 आज का राशिफल:</span>
    <p id="res-rashifal" class="highlight-box"></p>

    <span class="label">शुभ अंक और स्वभाव:</span>
    <p id="res-lucky-nature" style="color:#2E7D32; font-weight:500;"></p>

    <button class="audio-btn" id="voiceBtn" onclick="speakResult()">🔊 आवाज़ में सुनें</button>
  </div>

  <script>
    // अब आप यहाँ से रोज़ाना 'dailyPrediction' को बदल सकते हैं
    const dailyPrediction = {
        1: "मेष: आज का दिन ऊर्जा से भरपूर है। रुके हुए काम पूरे होंगे। <br><br><b>🎯 उपाय:</b> हनुमान चालीसा पढ़ें।",
        2: "वृषभ: धन लाभ के योग हैं। निवेश से लाभ मिलेगा। <br><br><b>🎯 उपाय:</b> लक्ष्मी जी का पूजन करें।",
        3: "मिथुन: बुद्धि से काम लें, सफलता मिलेगी। <br><br><b>🎯 उपाय:</b> गणेश जी को दूर्वा चढ़ाएं।",
        4: "कर्क: मन शांत रखें, परिवार का साथ मिलेगा। <br><br><b>🎯 उपाय:</b> शिव जी को जल चढ़ाएं।",
        5: "सिंह: आत्मविश्वास बढ़ा रहेगा, कार्य में विजय मिलेगी। <br><br><b>🎯 उपाय:</b> सूर्य को अर्घ्य दें।",
        6: "कन्या: मेहनत का फल मिलेगा, वाणी पर संयम रखें। <br><br><b>🎯 उपाय:</b> विष्णु जी का स्मरण करें।",
        7: "तुला: साझेदारी में लाभ होगा, रिश्तों में मिठास आएगी। <br><br><b>🎯 उपाय:</b> दुर्गा जी की पूजा करें।",
        8: "वृश्चिक: साहस बढ़ेगा, शत्रु शांत रहेंगे। <br><br><b>🎯 उपाय:</b> सुंदरकांड का पाठ करें।",
        9: "धनु: भाग्योदय का समय है, धार्मिक कार्यों में रुचि बढ़ेगी। <br><br><b>🎯 उपाय:</b> केले के पेड़ पर जल दें।",
        10: "मकर: धैर्य रखें, काम का दबाव रहेगा। <br><br><b>🎯 उपाय:</b> शनि चालीसा पढ़ें।",
        11: "कुंभ: आय के नए स्रोत खुलेंगे, मान-सम्मान बढ़ेगा। <br><br><b>🎯 उपाय:</b> पीपल पर जल चढ़ाएं।",
        12: "मीन: आध्यात्म में मन लगेगा, रचनात्मक कार्य सफल होंगे। <br><br><b>🎯 उपाय:</b> विष्णु जी का ध्यान करें।"
    };

    const nameMapping = {
        'A': { id: 1, rashi: "मेष (Aries)", god: "श्री हनुमान जी", nature: "साहसी और ऊर्जावान।", lucky: "9 और 1" },
        'B': { id: 2, rashi: "वृषभ (Taurus)", god: "माता लक्ष्मी", nature: "शांत और धैर्यवान।", lucky: "6 और 2" },
        'C': { id: 3, rashi: "मिथुन (Gemini)", god: "श्री गणेश जी", nature: "बुद्धिमान और चतुर।", lucky: "5 और 3" },
        'D': { id: 4, rashi: "कर्क (Cancer)", god: "भगवान शिव", nature: "भावुक और संवेदनशील।", lucky: "2 और 7" },
        'E': { id: 1, rashi: "मेष (Aries)", god: "श्री हनुमान जी", nature: "निडर और आत्मविश्वास से भरे।", lucky: "9 और 1" },
        'F': { id: 9, rashi: "धनु (Sagittarius)", god: "श्री हरि विष्णु", nature: "आशावादी और आध्यात्मिक।", lucky: "3 और 9" },
        'G': { id: 11, rashi: "कुंभ (Aquarius)", god: "भगवान शनि देव", nature: "स्वतंत्र और रचनात्मक।", lucky: "8 और 4" },
        'H': { id: 4, rashi: "कर्क (Cancer)", god: "भगवान शिव", nature: "कोमल हृदय के स्वामी।", lucky: "2 और 7" },
        'I': { id: 1, rashi: "मेष (Aries)", god: "श्री हनुमान जी", nature: "कुछ बड़ा करने का जज़्बा।", lucky: "9 और 1" },
        'J': { id: 10, rashi: "मकर (Capricorn)", god: "भगवान शनि देव", nature: "मेहनती और अनुशासित।", lucky: "8 और 6" },
        'K': { id: 3, rashi: "मिथुन (Gemini)", god: "श्री गणेश जी", nature: "तेज़ दिमाग और मिलनसार।", lucky: "5 और 3" },
        'L': { id: 1, rashi: "मेष (Aries)", god: "श्री हनुमान जी", nature: "मजबूत इरादों वाले।", lucky: "9 और 1" },
        'M': { id: 5, rashi: "सिंह (Leo)", god: "भगवान सूर्य देव", nature: "निडर और राजसी स्वभाव।", lucky: "1 और 5" },
        'N': { id: 8, rashi: "वृश्चिक (Scorpio)", god: "श्री हनुमान जी", nature: "रहस्यमयी और दृढ़।", lucky: "9 और 4" },
        'O': { id: 1, rashi: "मेष (Aries)", god: "श्री हनुमान जी", nature: "उत्साह से भरे हुए।", lucky: "9 और 1" },
        'P': { id: 6, rashi: "कन्या (Virgo)", god: "सरस्वती माता", nature: "समझदार और परफेक्ट।", lucky: "5 और 6" },
        'Q': { id: 3, rashi: "मिथुन (Gemini)", god: "श्री गणेश जी", nature: "तेज़ सोच वाले।", lucky: "5 और 3" },
        'R': { id: 7, rashi: "तुला (Libra)", god: "माता दुर्गा", nature: "संतुलन पसंद।", lucky: "6 और 5" },
        'S': { id: 11, rashi: "कुंभ (Aquarius)", god: "भगवान शिव", nature: "समाजसेवी स्वभाव।", lucky: "8 और 4" },
        'T': { id: 5, rashi: "सिंह (Leo)", god: "भगवान सूर्य देव", nature: "आकर्षक और साहसी।", lucky: "1 और 5" },
        'U': { id: 2, rashi: "वृषभ (Taurus)", god: "माता लक्ष्मी", nature: "स्थिर और कला प्रेमी।", lucky: "6 और 2" },
        'V': { id: 2, rashi: "वृषभ (Taurus)", god: "माता लक्ष्मी", nature: "वफादार और मेहनती।", lucky: "6 और 2" },
        'W': { id: 2, rashi: "वृषभ (Taurus)", god: "माता लक्ष्मी", nature: "संकल्पित इंसान।", lucky: "6 और 2" },
        'X': { id: 3, rashi: "मिथुन (Gemini)", god: "श्री गणेश जी", nature: "मिलनसार स्वभाव।", lucky: "5 और 3" },
        'Y': { id: 8, rashi: "वृश्चिक (Scorpio)", god: "श्री हनुमान जी", nature: "दृढ़ संकल्पित।", lucky: "9 और 4" },
        'Z': { id: 12, rashi: "मीन (Pisces)", god: "श्री कृष्ण", nature: "दयालु और आध्यात्मिक।", lucky: "3 और 7" }
    };

    function analyzeName() {
        let name = document.getElementById("userName").value.trim();
        if(!name) { alert("कृपया अपना नाम लिखें!"); return; }
        let char = name.toUpperCase().charAt(0);
        let info = nameMapping[char] || nameMapping['A'];
        
        document.getElementById("res-name").innerText = name + " जी";
        document.getElementById("res-rashi").innerText = info.rashi + " | इष्ट देव: " + info.god;
        document.getElementById("res-rashifal").innerHTML = dailyPrediction[info.id];
        document.getElementById("res-lucky-nature").innerHTML = `<b>स्वभाव:</b> ${info.nature}<br><b>शुभ अंक:</b> ${info.lucky}`;
        document.getElementById("result").style.display = "block";
    }

    function speakResult() {
        let text = document.getElementById("res-name").innerText + " जी, " + document.getElementById("res-rashifal").innerText.replace(/<[^>]*>?/gm, '');
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }
  </script>
</body>
</html>
