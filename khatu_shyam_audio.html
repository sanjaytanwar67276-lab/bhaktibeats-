<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhajan List - Bhakti Sagar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf6e3; padding: 15px; margin: 0; }
        
        /* List View Styles */
        #listView { max-width: 600px; margin: auto; }
        .list-box { background: white; padding: 18px 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d35400; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .list-box:active { transform: scale(0.98); background: #f9f9f9; }
        .list-title { font-size: 18px; color: #2c3e50; font-weight: bold; margin: 0; }
        .play-icon { font-size: 24px; color: #d35400; }

        /* Player View Styles */
        #playerView { max-width: 600px; margin: auto; display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
        .back-btn:active { background: #ba4a00; }
        #playerTitle { color: #d35400; margin-top: 0; font-size: 22px; text-align: center; }
        audio { width: 100%; margin: 15px 0; outline: none; }
        .lyrics-container { white-space: pre-wrap; color: #333; font-size: 16px; line-height: 1.8; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 10px; }
        
        .header-title { text-align: center; color: #d35400; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="listView">
    <h2 class="header-title" id="pageMainTitle">🙏 श्री खाटू श्याम भजन 🙏</h2>
    <div id="listContainer">
        <p style="text-align:center;">डेटा लोड हो रहा है...</p>
    </div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">Title</h2>
    <audio id="myAudio" controls>
        <source id="audioSource" src="" type="audio/mpeg">
    </audio>
    <div id="playerLyrics" class="lyrics-container">Lyrics Here</div>
</div>

<script>
    // 👇 यहाँ अपना पब्लिश किया हुआ असली CSV लिंक डालें 👇
    const csvUrl = "YAHA_APNA_CSV_LINK_PASTE_KAREIN";

    let allBhajans = []; 

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // डेटा को लाइनों में तोड़ें
            const rows = data.split('\n').slice(1);
            allBhajans = []; 
            
            rows.forEach((row) => {
                // कॉमा (,) के हिसाब से अलग करें, लेकिन कोट्स ("") के अंदर वाले कॉमा को छोड़ दें
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                
                // अगर कम से कम 5 कॉलम हैं (भले ही 6ठा खाली हो)
                if (columns.length >= 5) {
                    const id = columns[0] ? columns[0].replace(/"/g, "").trim() : "";
                    const category = columns[1] ? columns[1].replace(/"/g, "").trim() : "";
                    const title = columns[2] ? columns[2].replace(/"/g, "").trim() : "";
                    const audio = columns[3] ? columns[3].replace(/"/g, "").trim() : "";
                    const lyrics = columns[4] ? columns[4].replace(/"/g, "").replace(/\\n/g, '\n').trim() : "";
                    
                    // 6ठा कॉलम (type) है तो लें, वरना खाली मान लें
                    const type = columns[5] ? columns[5].replace(/"/g, "").trim() : "";

                    // 🔴 FILTER: खाटू श्याम जी के सिर्फ 'Bhajan'
                    if (category === "Khatu Shyam" && type === "Bhajan") {
                        allBhajans.push({ title, audio, lyrics });
                    }
                }
            });

            renderList();

        } catch (error) {
            document.getElementById('listContainer').innerHTML = "<p style='text-align:center; color:red;'>डेटा लोड करने में समस्या आई।</p>";
        }
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = ""; 

        // अगर फ़िल्टर होने के बाद कोई गाना नहीं मिला
        if(allBhajans.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>अभी इस केटेगरी में कोई भजन नहीं है।</p>";
            return;
        }

        // लिस्ट बनाएँ
        allBhajans.forEach((item, index) => {
            const box = document.createElement('div');
            box.className = 'list-box';
            box.onclick = () => openPlayer(index); 

            box.innerHTML = `
                <h3 class="list-title">${item.title}</h3>
                <span class="play-icon">▶</span>
            `;
            container.appendChild(box);
        });
    }

    function openPlayer(index) {
        const item = allBhajans[index];
        
        // लिस्ट छुपाएं, प्लेयर दिखाएं
        document.getElementById('listView').style.display = 'none';
        document.getElementById('playerView').style.display = 'block';
        
        // प्लेयर में डेटा भरें
        document.getElementById('playerTitle').innerText = item.title;
        document.getElementById('playerLyrics').innerText = item.lyrics;
        
        const audioPlayer = document.getElementById('myAudio');
        document.getElementById('audioSource').src = (item.audio.includes("http")) ? item.audio : "";
        audioPlayer.load(); 
        
        // अगर ऑडियो लिंक है तो ऑटो-प्ले करें
        if(item.audio.includes("http")) {
            audioPlayer.play();
        }
    }

    function goBack() {
        // प्लेयर छुपाएं, लिस्ट दिखाएं
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        
        // गाना बंद करें
        const audioPlayer = document.getElementById('myAudio');
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
    }

    // ऐप लोड होते ही फंक्शन चलाएं
    loadData();
</script>

</body>
</html>
