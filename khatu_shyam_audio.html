<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhakti Sagar - Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf6e3; padding: 15px; margin: 0; }
        #listView, #playerView { max-width: 600px; margin: auto; }
        .header-title { text-align: center; color: #d35400; margin-bottom: 20px; font-size: 22px; }
        .list-box { background: white; padding: 18px 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d35400; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .list-title { font-size: 18px; color: #2c3e50; font-weight: bold; margin: 0; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; width: 100%; font-size: 16px; text-align: center; }
        #playerTitle { color: #d35400; text-align: center; margin-bottom: 15px; }
        audio { width: 100%; margin-bottom: 20px; }
        .lyrics-container { white-space: pre-wrap; color: #333; font-size: 16px; line-height: 1.8; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; max-height: 350px; overflow-y: auto; }
        .no-data { text-align: center; padding: 20px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

<div id="listView">
    <h2 class="header-title" id="pageMainTitle">🙏 लोडिंग... 🙏</h2>
    <div id="listContainer"></div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">Title</h2>
    <audio id="myAudio" controls autoplay><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    // AAPKA SAHI CSV LINK
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "Khatu Shyam").trim().toLowerCase();
    const selectedType = (urlParams.get('type') || "Bhajan").trim().toLowerCase();

    const displayCat = urlParams.get('cat') || 'Khatu Shyam';
    const displayType = urlParams.get('type') || 'Bhajan';
    document.getElementById('pageMainTitle').innerText = `🙏 ${displayCat} ${displayType} 🙏`;

    let allItems = [];

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // Smart CSV parsing: handles quotes and commas correctly
            const rows = data.split(/\r?\n/).slice(1);
            
            allItems = [];
            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if (cols && cols.length >= 6) {
                    const clean = (str) => str.replace(/^"|"$/g, '').trim();
                    
                    const rowCat = clean(cols[1]);
                    const rowType = clean(cols[5]);

                    // Case-insensitive filtering
                    if (rowCat.toLowerCase() === selectedCat && rowType.toLowerCase() === selectedType) {
                        allItems.push({
                            title: clean(cols[2]),
                            audio: clean(cols[3]),
                            lyrics: clean(cols[4]).replace(/\\n/g, '\n')
                        });
                    }
                }
            });
            renderList();
        } catch (e) {
            document.getElementById('listContainer').innerHTML = "<p class='no-data'>Network Error! Sheet load nahi ho payi.</p>";
        }
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (allItems.length === 0) {
            container.innerHTML = `<p class='no-data'>Abhi koi ${displayType} uplabd nahi hai.</p>`;
            return;
        }
        allItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => openPlayer(index);
            div.innerHTML = `<h3 class="list-title">${item.title}</h3><span>▶</span>`;
            container.appendChild(div);
        });
    }

    function openPlayer(index) {
        const item = allItems[index];
        document.getElementById('listView').style.display = 'none';
        document.getElementById('playerView').style.display = 'block';
        document.getElementById('playerTitle').innerText = item.title;
        document.getElementById('playerLyrics').innerText = item.lyrics;
        const audio = document.getElementById('myAudio');
        document.getElementById('audioSource').src = item.audio;
        audio.load();
        audio.play();
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
