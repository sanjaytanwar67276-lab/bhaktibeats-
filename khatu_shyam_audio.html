<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर - प्लेयर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; }
        .list-box { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; width: 100%; cursor: pointer; }
        .lyrics-container { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; margin-top: 10px; }
        h2 { color: #d35400; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">लोडिंग...</h2>
    <div id="listContainer">डेटा लोड हो रहा है, कृपया रुकें...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">Title</h2>
    <audio id="myAudio" controls><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    // 🔴 1. आपका CSV लिंक 🔴
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    // 🔴 2. URL से नाम पकड़ना 🔴
    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "").trim().toLowerCase();
    const selectedType = (urlParams.get('type') || "").trim().toLowerCase();

    document.getElementById('pageMainTitle').innerText = "🙏 श्री " + (urlParams.get('cat') || "भक्ति") + " संग्रह 🙏";

    let allItems = [];

    async function loadData() {
        try {
            // "v=" डालने से Vercel पुरानी फाइल नहीं दिखा पाएगा
            const response = await fetch(csvUrl + "&v=" + Math.random());
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            
            allItems = [];
            rows.forEach(row => {
                // स्मार्ट स्प्लिट: जो कोमा और कोट्स को सही से हैंडल करे
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());

                if (cols.length >= 6) {
                    const rowCat = cols[1].toLowerCase();
                    const rowType = cols[5].toLowerCase();

                    // अगर URL में कुछ नहीं मिला, तो सब दिखा दो (Testing के लिए)
                    // वरना मैच करके दिखाओ
                    if (!selectedCat || (rowCat.includes(selectedCat) && rowType.includes(selectedType))) {
                        allItems.push({
                            title: cols[2],
                            audio: cols[3],
                            lyrics: cols[4].replace(/\\n/g, '\n')
                        });
                    }
                }
            });
            renderList();
        } catch (e) {
            document.getElementById('listContainer').innerHTML = "सर्वर से जुड़ नहीं पाए।";
        }
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (allItems.length === 0) {
            container.innerHTML = "<b>कोई डेटा नहीं मिला।</b><br>Category: " + selectedCat + "<br>Type: " + selectedType;
            return;
        }
        allItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => openPlayer(index);
            div.innerHTML = "<b>" + item.title + "</b> <span style='float:right'>▶</span>";
            container.appendChild(div);
        });
    }

    function openPlayer(index) {
        const item = allItems[index];
        document.getElementById('listView').style.display = 'none';
        document.getElementById('playerView').style.display = 'block';
        document.getElementById('playerTitle').innerText = item.title;
        document.getElementById('playerLyrics').innerText = item.lyrics;
        const audio = document.getElementById('myAudio');
        document.getElementById('audioSource').src = item.audio;
        audio.load();
        audio.play();
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
