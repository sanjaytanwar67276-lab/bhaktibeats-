<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; color: #3e2723; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 3px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics-container { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.8; font-size: 16px; }
        h2 { color: #d35400; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 लोड हो रहा है... 🙏</h2>
    <div id="listContainer">डेटा मंगाया जा रहा है...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">शीर्षक</h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    // 🔴 आपकी शीट का सटीक डेटा लिंक 🔴
    const sheetID = "1Sw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E";
    const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "").toLowerCase().trim();
    const selectedType = (urlParams.get('type') || "").toLowerCase().trim();

    document.getElementById('pageMainTitle').innerText = "🙏 " + (urlParams.get('cat') || "भक्ति") + " संग्रह 🙏";

    async function loadData() {
        try {
            const response = await fetch(jsonUrl);
            const text = await response.text();
            // गूगल के रिस्पॉन्स से फालतू टेक्स्ट हटाकर शुद्ध JSON बनाना
            const jsonData = JSON.parse(text.substring(47, text.length - 2));
            const rows = jsonData.table.rows;
            
            let allItems = [];
            rows.forEach(row => {
                const cells = row.c;
                // कॉलम की मैपिंग: B=1 (Cat), C=2 (Title), D=3 (URL), E=4 (Lyrics), F=5 (Type)
                const rowCat = cells[1]?.v?.toString().toLowerCase() || "";
                const rowType = cells[5]?.v?.toString().toLowerCase() || "";

                if (rowCat.includes(selectedCat) && rowType.includes(selectedType)) {
                    allItems.push({
                        title: cells[2]?.v || "No Title",
                        audio: cells[3]?.v || "",
                        lyrics: cells[4]?.v || "Lyrics not available."
                    });
                }
            });
            renderList(allItems);
        } catch (e) {
            console.error(e);
            document.getElementById('listContainer').innerText = "सर्वर एरर! कृपया लिंक चेक करें।";
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (items.length === 0) {
            container.innerHTML = `<b>डेटा नहीं मिला!</b><br><small>URL: ${selectedCat} | ${selectedType}</small>`;
            return;
        }
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span>▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
