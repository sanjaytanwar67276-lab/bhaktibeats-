<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 3px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics-container { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.6; }
        h2 { color: #d35400; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 लोड हो रहा है... 🙏</h2>
    <div id="listContainer">कृपया प्रतीक्षा करें...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">शीर्षक</h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?output=csv";

    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "").toLowerCase().trim();
    const selectedType = (urlParams.get('type') || "").toLowerCase().trim();

    document.getElementById('pageMainTitle').innerText = "🙏 " + (urlParams.get('cat') || "भक्ति") + " 🙏";

    async function loadData() {
        try {
            const response = await fetch(csvUrl + "?cache=" + new Date().getTime());
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            
            let allItems = [];
            rows.forEach(row => {
                if(!row.trim()) return;

                // 🔴 सबसे पॉवरफुल तरीका: अगर पूरी लाइन में कहीं भी Category और Type शब्द हैं 🔴
                const rowLower = row.toLowerCase();
                
                if (rowLower.includes(selectedCat) && rowLower.includes(selectedType)) {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                    
                    if (cols.length >= 4) {
                        allItems.push({
                            title: cols[2],
                            audio: cols[3],
                            lyrics: (cols[4] || "").replace(/\\n/g, '\n')
                        });
                    }
                }
            });
            renderList(allItems);
        } catch (e) {
            document.getElementById('listContainer').innerText = "सर्वर से डेटा नहीं मिला।";
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        
        if (items.length === 0) {
            container.innerHTML = `<b>कोई डेटा नहीं मिला।</b><br>
            <small>URL: ${selectedCat} | ${selectedType}</small><br><br>
            <p style="font-size:12px; color:gray;">कृपया ब्राउज़र का 'Cache' साफ़ करें।</p>`;
            return;
        }

        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span>▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
