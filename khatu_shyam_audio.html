<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर - प्लेयर</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf6e3; padding: 15px; margin: 0; }
        
        /* --- लिस्ट व्यू (शुरुआती स्क्रीन) के स्टाइल्स --- */
        #listView { max-width: 600px; margin: auto; }
        .list-box { background: white; padding: 18px 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d35400; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .list-box:active { transform: scale(0.98); background: #f9f9f9; }
        .list-title { font-size: 18px; color: #2c3e50; font-weight: bold; margin: 0; }
        .play-icon { font-size: 24px; color: #d35400; }

        /* --- प्लेयर व्यू (क्लिक करने पर खुलने वाली स्क्रीन) के स्टाइल्स --- */
        #playerView { max-width: 600px; margin: auto; display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .back-btn:active { background: #ba4a00; }
        #playerTitle { color: #d35400; margin-top: 0; font-size: 22px; text-align: center; }
        audio { width: 100%; margin: 15px 0; outline: none; }
        .lyrics-container { white-space: pre-wrap; color: #333; font-size: 16px; line-height: 1.8; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 10px; max-height: 350px; overflow-y: auto; }
        
        .header-title { text-align: center; color: #d35400; margin-bottom: 20px; }
        .loading { text-align: center; color: #d35400; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="listView">
    <h2 class="header-title" id="pageMainTitle">🙏 लोड हो रहा है... 🙏</h2>
    <div id="listContainer">
        <p class="loading">डेटा लोड हो रहा है...</p>
    </div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">Title</h2>
    
    <audio id="myAudio" controls autoplay>
        <source id="audioSource" src="" type="audio/mpeg">
        आपका ब्राउज़र ऑडियो एलीमेंट का समर्थन नहीं करता है।
    </audio>
    
    <div id="playerLyrics" class="lyrics-container">लिरिक्स लोड हो रहे हैं...</div>
</div>

<script>
    // 🔴 आपका सही गूगल शीट का CSV लिंक 🔴
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    // URL से Category और Type निकालें
    const urlParams = new URLSearchParams(window.location.search);
    // छोटे अक्षरों में बदलकर स्टोर करें ताकि तुलना आसान हो
    const selectedCat = (urlParams.get('cat') || "Khatu Shyam").trim().toLowerCase();
    const selectedType = (urlParams.get('type') || "Bhajan").trim().toLowerCase();

    // पेज का टाइटल सेट करें (दिखाने के लिए पहला अक्षर बड़ा कर देंगे)
    const displayCat = urlParams.get('cat') || "Khatu Shyam";
    const displayType = urlParams.get('type') || "Bhajan";
    document.getElementById('pageMainTitle').innerText = `🙏 ${displayCat} ${displayType} 🙏`;

    let allItems = []; // डेटा को स्टोर करने के लिए एरे

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.text();
            
            // CSV की हर लाइन को अलग-अलग करें
            const rows = data.split('\n').slice(1);
            allItems = []; 
            
            rows.forEach((row) => {
                // CSV columns: id(0), category(1), title(2), audio(3), lyrics(4), type(5)
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                
                if (columns.length >= 6) {
                    // डेटा साफ़ करें और छोटे अक्षरों में बदलें
                    const category = columns[1].replace(/"/g, "").trim().toLowerCase();
                    const title = columns[2].replace(/"/g, "").trim();
                    const audio = columns[3].replace(/"/g, "").trim();
                    const lyrics = columns[4].replace(/"/g, "").replace(/\\n/g, '\n').trim();
                    const type = columns[5].replace(/"/g, "").trim().toLowerCase();

                    // 🔴 सुपर स्मार्ट फ़िल्टर: छोटे अक्षरों में तुलना 🔴
                    if (category === selectedCat && type === selectedType) {
                        allItems.push({ title, audio, lyrics });
                    }
                }
            });
            renderList();
        } catch (error) {
            console.error("Error loading data:", error);
            document.getElementById('listContainer').innerHTML = "<p style='text-align:center;'>डेटा लोड नहीं हो पाया। अपना CSV लिंक चेक करें।</p>";
        }
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = ""; 

        if(allItems.length === 0) {
            // यहाँ टाइप का नाम पहला अक्षर बड़ा करके दिखाएँगे
            consttypeName = selectedType.charAt(0).toUpperCase() + selectedType.slice(1);
            container.innerHTML = `<p style='text-align:center;'>अभी कोई ${typeName} उपलब्ध नहीं है।</p>`;
            return;
        }

        allItems.forEach((item, index) => {
            const box = document.createElement('div');
            box.className = 'list-box';
            box.onclick = () => openPlayer(index); 
            box.innerHTML = `<h3 class="list-title">${item.title}</h3><span class="play-icon">▶</span>`;
            container.appendChild(box);
        });
    }

    function openPlayer(index) {
        const item = allItems[index];
        document.getElementById('listView').style.display = 'none';
        document.getElementById('playerView').style.display = 'block';
        document.getElementById('playerTitle').innerText = item.title;
        document.getElementById('playerLyrics').innerText = item.lyrics;
        const audioPlayer = document.getElementById('myAudio');
        document.getElementById('audioSource').src = item.audio;
        audioPlayer.load(); 
        audioPlayer.play();
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>

</body>
</html>
