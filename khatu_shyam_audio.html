<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatu Shyam Bhajans - Bhakti Sagar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff5e6; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: #d35400; padding: 20px 0; }
        .bhajan-box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #d35400; }
        h3 { color: #2c3e50; margin-top: 0; font-size: 20px; }
        audio { width: 100%; margin: 15px 0; border-radius: 30px; }
        .lyrics { white-space: pre-wrap; color: #444; font-size: 16px; line-height: 1.8; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; max-height: 400px; overflow-y: auto; }
        .loading { text-align: center; font-weight: bold; color: #d35400; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container" id="bhajanList">
    <div class="header">
        <h1>🙏 श्री खाटू श्याम भजन 🙏</h1>
        <p>भजन लोड हो रहे हैं...</p>
    </div>
</div>

<script>
    // Aapka Google Sheet CSV Link
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    // Pro-level CSV Parser (ताकि बड़ी लिरिक्स से ऐप क्रैश न हो)
    function parseCSV(str) {
        const arr = [];
        let quote = false;
        let row = 0, col = 0;
        for (let c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    async function loadBhajans() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            const rows = parseCSV(data);
            const container = document.getElementById('bhajanList');
            container.innerHTML = '<div class="header"><h1>🙏 श्री खाटू श्याम भजन 🙏</h1></div>';

            let found = false;

            // Heading row (index 0) को छोड़कर बाकी डेटा पढ़ें
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i];
                if (columns.length >= 5) {
                    const category = columns[1].trim();
                    const title = columns[2].trim();
                    const audio = columns[3].trim();
                    const lyrics = columns[4].trim();

                    // सिर्फ 'Khatu Shyam' कैटेगरी वाले भजन दिखाएं
                    if (category === "Khatu Shyam" && title !== "") {
                        found = true;
                        const finalAudio = (audio.includes("http")) ? audio : "";
                        const html = `
                            <div class="bhajan-box">
                                <h3>${title}</h3>
                                ${finalAudio ? `<audio controls><source src="${finalAudio}" type="audio/mpeg"></audio>` : `<p style="color:#d35400; font-size:14px; font-weight:bold;">ऑडियो जल्द आ रहा है...</p>`}
                                <div class="lyrics">${lyrics}</div>
                            </div>
                        `;
                        container.innerHTML += html;
                    }
                }
            }

            if (!found) {
                container.innerHTML += "<p style='text-align:center;'>अभी खाटू श्याम जी के भजन शीट में नहीं डाले गए हैं।</p>";
            }

        } catch (error) {
            console.error(error);
            document.getElementById('bhajanList').innerHTML = "<p style='text-align:center; color:red;'>डेटा लोड करने में समस्या आई। कृपया इंटरनेट चेक करें।</p>";
        }
    }

    loadBhajans();
</script>

</body>
</html>
