<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhakti Sagar Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf6e3; padding: 15px; margin: 0; }
        #listView, #playerView { max-width: 600px; margin: auto; }
        .header-title { text-align: center; color: #d35400; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .list-box { background: white; padding: 18px 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid #d35400; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }
        #songTitle { color: #d35400; text-align: center; font-size: 22px; margin-top: 0; }
        audio { width: 100%; margin: 20px 0; }
        .lyrics-box { white-space: pre-wrap; line-height: 1.8; background: #fffaf0; padding: 20px; border-radius: 15px; border: 1px dashed #d35400; font-size: 16px; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="listView">
    <h2 class="header-title" id="mainHeader">🙏 भक्ति सागर 🙏</h2>
    <div id="listContainer"><p style="text-align:center;">डेटा लोड हो रहा है...</p></div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस</button>
    <h2 id="songTitle">Bhajan Name</h2>
    <audio id="mainAudio" controls><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="songLyrics" class="lyrics-box"></div>
</div>

<script>
    // आपका CSV लिंक
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    const params = new URLSearchParams(window.location.search);
    // URL से आने वाले डेटा को छोटे अक्षरों में बदल रहे हैं
    const selectedCat = (params.get('cat') || 'Khatu Shyam').toLowerCase().trim();
    const selectedType = (params.get('type') || 'Bhajan').toLowerCase().trim();

    document.getElementById('mainHeader').innerText = `🙏 ${params.get('cat') || 'Khatu Shyam'} ${params.get('type') || 'Bhajan'} 🙏`;

    let songData = [];

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            // कोमा और कोट्स को सही से पढ़ने के लिए कोडिंग
            const rows = text.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            
            songData = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r.length < 5) continue;

                // शीट के डेटा को छोटे अक्षरों (small letters) में बदलकर चेक कर रहे हैं
                const rowCat = (r[1] || "").replace(/"/g, "").trim().toLowerCase();
                const rowType = (r[5] || "").replace(/"/g, "").trim().toLowerCase();

                // अब चाहे छोटा अक्षर हो या बड़ा, मैच हो जाएगा
                if (rowCat === selectedCat && rowType === selectedType) {
                    songData.push({
                        title: r[2]?.replace(/"/g, "").trim() || "No Title",
                        audio: r[3]?.replace(/"/g, "").trim() || "",
                        lyrics: r[4]?.replace(/"/g, "").replace(/\\n/g, '\n').trim() || "लिरिक्स उपलब्ध नहीं हैं।"
                    });
                }
            }
            displayList();
        } catch (error) {
            document.getElementById('listContainer').innerHTML = "डेटा लोड नहीं हो पाया।";
        }
    }

    function displayList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (songData.length === 0) {
            container.innerHTML = `<p style='text-align:center;'>क्षमा करें, अभी कोई सामग्री उपलब्ध नहीं है।</p>`;
            return;
        }
        songData.forEach((song, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => openPlayer(index);
            div.innerHTML = `<p class="list-title">${song.title}</p><span style="color:#d35400">▶</span>`;
            container.appendChild(div);
        });
    }

    function openPlayer(index) {
        const song = songData[index];
        document.getElementById('listView').style.display = 'none';
        document.getElementById('playerView').style.display = 'block';
        document.getElementById('songTitle').innerText = song.title;
        document.getElementById('songLyrics').innerText = song.lyrics;
        const audio = document.getElementById('mainAudio');
        document.getElementById('audioSource').src = song.audio;
        audio.load();
        if(song.audio) audio.play();
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('mainAudio').pause();
    }

    loadData();
</script>
</body>
</html>
