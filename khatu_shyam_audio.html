<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 3px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics-container { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 लोड हो रहा है... 🙏</h2>
    <div id="listContainer">डेटा मंगाया जा रहा है...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस</button>
    <h2 id="playerTitle">शीर्षक</h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    // 🔴 नया लिंक जो सुरक्षा घेरे (CORS) को तोड़ देगा 🔴
    const sheetId = "1Sw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E";
    const csvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?output=csv`;

    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "khatu").toLowerCase().trim();
    const selectedType = (urlParams.get('type') || "bhajan").toLowerCase().trim();

    document.getElementById('pageMainTitle').innerText = "🙏 " + (urlParams.get('cat') || "भक्ति") + " संग्रह 🙏";

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // CSV को लाइनों में तोड़ें
            const rows = data.split(/\r?\n/).map(row => {
                // स्मार्ट कोमा स्प्लिट
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            });

            let allItems = [];
            // पहली लाइन हेडर है, इसलिए i=1 से शुरू करें
            for(let i=1; i<rows.length; i++) {
                const cols = rows[i];
                if (cols.length >= 5) {
                    const rowCat = (cols[1] || "").toLowerCase();
                    const rowType = ((cols[5] || "") + (cols[6] || "")).toLowerCase();

                    // अगर कैटेगरी और टाइप में नाम मिलता-जुलता है
                    if (rowCat.includes(selectedCat) && rowType.includes(selectedType)) {
                        allItems.push({
                            title: cols[2],
                            audio: cols[3],
                            lyrics: (cols[4] || "").replace(/\\n/g, '\n')
                        });
                    }
                }
            }
            renderList(allItems);
        } catch (e) {
            document.getElementById('listContainer').innerText = "शीट से डेटा नहीं मिल पाया। इंटरनेट चेक करें।";
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (items.length === 0) {
            container.innerHTML = "<b>कोई भजन नहीं मिला।</b><br><small>खोजा गया: " + selectedCat + " | " + selectedType + "</small>";
            return;
        }
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = "<b>" + item.title + "</b> <span>▶</span>";
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
