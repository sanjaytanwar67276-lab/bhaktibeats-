<div class="smart-card">
  <h3>▶ तीन बाण के धारी (Bhakti Sagar Original)</h3>
  
  <audio id="audio_teen_baan" controls preload="none">
    <source src="https://archive.org/download/20260415_20260415_1802/%E0%A4%A4%E0%A5%80%E0%A4%A8%20%E0%A4%AC%E0%A4%BE%E0%A4%A3%20%E0%A4%9A%E0%A4%B2%E0%A4%BE%E0%A4%93.mp3" type="audio/mpeg">
    आपका फोन ऑडियो सपोर्ट नहीं करता।
  </audio>
  
  <button class="lyrics-btn" onclick="startKaraoke('lyrics_teen_baan', 'audio_teen_baan', timing_teen_baan)">📖 भजन के बोल (Auto-Scroll)</button>
  
  <div id="lyrics_teen_baan" class="lyrics-box">
    <span class="lyrics-line">तीन बाण के धारी, ओ नीले घोड़े वाले।</span>
    <span class="lyrics-line">तेरी महिमा है न्यारी, ओ खाटू वाले॥</span>
    <span class="lyrics-line">हारे का तू है सहारा, बाबा श्याम हमारा।</span>
    <span class="lyrics-line">भक्तों के दुःख दूर करे तू, शीश का दानी प्यारा॥</span>
    <span class="lyrics-line">तेरे दर पे जो भी आता, किस्मत अपनी चमकाता।</span>
    <span class="lyrics-line">तीन बाण के धारी, ओ नीले घोड़े वाले॥</span>
  </div>
</div>
<script>
  // Karaoke timing (Seconds mein) - Agar line aage-peeche ho toh in numbers ko thoda badal lena
  var timing_teen_baan = [0, 6, 12, 18, 24, 30];

  function startKaraoke(lyricsId, audioId, timing) {
    var box = document.getElementById(lyricsId);
    var player = document.getElementById(audioId);
    var lines = box.getElementsByClassName('lyrics-line');
    
    if (box.style.display === "none" || box.style.display === "") {
      box.style.display = "block";
      player.play(); // Button dabate hi gaana chal padega
      
      setInterval(function() {
        var now = player.currentTime;
        for (var i = 0; i < timing.length; i++) {
          if (now >= timing[i]) {
            for (var j = 0; j < lines.length; j++) lines[j].classList.remove('active-line');
            if (lines[i]) {
              lines[i].classList.add('active-line');
              lines[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        }
      }, 500);
    } else {
      box.style.display = "none";
      player.pause(); // Band karne par gaana bhi pause ho jayega
    }
  }
</script>
