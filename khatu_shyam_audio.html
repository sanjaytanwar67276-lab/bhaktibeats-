<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भजन और आरती संग्रह</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fcecd5; margin: 0; padding: 0; }
        
        /* Header Style */
        .header { background: linear-gradient(to right, #e83e8c, #c2185b); color: white; padding: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header .back-btn { position: absolute; left: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        
        .container { padding: 15px; }

        /* Card Styles */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card.shyam { border-left: 6px solid #2196F3; }
        .card.shiv { border-left: 6px solid #4CAF50; }
        .card.hanuman { border-left: 6px solid #FF5722; }

        .card-header { display: flex; align-items: center; margin-bottom: 15px; }
        .icon { font-size: 35px; margin-right: 15px; }
        .title-box h2 { font-size: 20px; margin: 0; }
        .shyam h2 { color: #2196F3; }
        .shiv h2 { color: #4CAF50; }
        .hanuman h2 { color: #FF5722; }
        .subtitle { font-size: 12px; color: #7f8c8d; margin-top: 3px; }

        /* Buttons Style */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { text-decoration: none; padding: 6px 18px; border-radius: 20px; font-size: 15px; font-weight: bold; background: white; transition: 0.2s; }
        .btn.shyam-btn { color: #2196F3; border: 1px solid #2196F3; }
        .btn.shiv-btn { color: #4CAF50; border: 1px solid #4CAF50; }
        .btn.hanuman-btn { color: #FF5722; border: 1px solid #FF5722; }
        .btn:active { background: #f0f0f0; transform: scale(0.95); }

        /* AdMob Placeholder */
        .ad-banner { background: #fff9c4; border: 1px dashed #fbc02d; color: #d35400; text-align: center; padding: 15px; margin-bottom: 20px; border-radius: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="back-btn">⬅ वापस</a>
        भजन और आरती संग्रह 🎧
    </div>

    <div class="container">

        <div class="card shyam">
            <div class="card-header">
                <div class="icon">🏹</div>
                <div class="title-box">
                    <h2>श्री खाटू श्याम जी</h2>
                    <p class="subtitle">हारे का सहारा, बाबा श्याम हमारा</p>
                </div>
            </div>
            <div class="btn-group">
                <a href="khatu_shyam_audio.html?cat=Khatu Shyam&type=Bhajan" class="btn shyam-btn">भजन</a>
                <a href="khatu_shyam_audio.html?cat=Khatu Shyam&type=Aarti" class="btn shyam-btn">आरती</a>
                <a href="khatu_shyam_audio.html?cat=Khatu Shyam&type=Stuti" class="btn shyam-btn">स्तुति</a>
                <a href="khatu_shyam_audio.html?cat=Khatu Shyam&type=Chalisa" class="btn shyam-btn">चालीसा</a>
            </div>
        </div>

        <div class="card shiv">
            <div class="card-header">
                <div class="icon">🔱</div>
                <div class="title-box">
                    <h2>भगवान शिव (महाकाल)</h2>
                    <p class="subtitle">सत्य, शिव, सुंदर</p>
                </div>
            </div>
            <div class="btn-group">
                <a href="khatu_shyam_audio.html?cat=Shiv Ji&type=Bhajan" class="btn shiv-btn">भजन</a>
                <a href="khatu_shyam_audio.html?cat=Shiv Ji&type=Aarti" class="btn shiv-btn">आरती</a>
                <a href="khatu_shyam_audio.html?cat=Shiv Ji&type=Stuti" class="btn shiv-btn">स्तुति</a>
                <a href="khatu_shyam_audio.html?cat=Shiv Ji&type=Chalisa" class="btn shiv-btn">चालीसा</a>
            </div>
        </div>

        <div class="ad-banner">
            यहाँ AdMob Banner Ad दिखेगा
        </div>

        <div class="card hanuman">
            <div class="card-header">
                <div class="icon">🐒</div>
                <div class="title-box">
                    <h2>श्री हनुमान जी</h2>
                    <p class="subtitle">संकटमोचन महाबली</p>
                </div>
            </div>
            <div class="btn-group">
                <a href="khatu_shyam_audio.html?cat=Hanuman Ji&type=Chalisa" class="btn hanuman-btn">चालीसा</a>
                <a href="khatu_shyam_audio.html?cat=Hanuman Ji&type=Aarti" class="btn hanuman-btn">आरती</a>
                <a href="khatu_shyam_audio.html?cat=Hanuman Ji&type=Bhajan" class="btn hanuman-btn">भजन</a>
                <a href="khatu_shyam_audio.html?cat=Hanuman Ji&type=Stuti" class="btn hanuman-btn">बाण</a> </div>
        </div>

    </div>

</body>
</html>
