<div id="quiz-box" style="padding: 20px; font-family: sans-serif; text-align: center; border: 2px solid #ff5722; border-radius: 15px; margin: 10px;">
    <h3 id="question-text" style="color: #333;">सवाल यहाँ दिखेगा...</h3>
    <div id="options-container" style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
        </div>
    <p id="quiz-message" style="margin-top: 20px; font-weight: bold; color: red;"></p>
</div>

<div style="text-align: center; margin-top: 20px;">
    <button id="next-quiz-btn" disabled style="background: grey; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: not-allowed;">
        अगला क्विज (Locked) 🔒
    </button>
</div>

<script>
// आपके सवालों की लिस्ट (इसे आप बढ़ा सकते हैं)
const allQuestions = [
    { q: "हनुमान जी के पिता का क्या नाम था?", a: ["केसरी", "पवन देव", "सुग्रीव", "बाली"], correct: "केसरी" },
    { q: "रामायण के रचयिता कौन हैं?", a: ["वाल्मीकि", "तुलसीदास", "वेदव्यास", "कालिदास"], correct: "वाल्मीकि" },
    { q: "अर्जुन के धनुष का क्या नाम था?", a: ["गांडीव", "पिनाक", "शारंग", "विजय"], correct: "गांडीव" },
    { q: "कौरवों की संख्या कितनी थी?", a: ["100", "50", "105", "101"], correct: "100" },
    { q: "कृष्ण जी का जन्म कहाँ हुआ था?", a: ["मथुरा", "गोकुल", "द्वारका", "वृंदावन"], correct: "मथुरा" }
];

let currentQIndex = 0;
let score = 0;
let shuffledQuestions = [];

// 1. शफल फंक्शन (सवालों को मिक्स करने के लिए)
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function startNewQuiz() {
    shuffledQuestions = shuffle([...allQuestions]); // सवालों को मिक्स किया
    currentQIndex = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    const qData = shuffledQuestions[currentQIndex];
    document.getElementById("question-text").innerText = `प्रश्न ${currentQIndex + 1}: ${qData.q}`;
    const optionsDiv = document.getElementById("options-container");
    optionsDiv.innerHTML = "";

    // ऑप्शन्स को भी शफल करें ताकि उत्तर रटा न जा सके
    shuffle([...qData.a]).forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.style = "padding: 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #f9f9f9;";
        btn.onclick = () => checkAnswer(opt, qData.correct);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected, correct) {
    if (selected === correct) score++;
    
    currentQIndex++;
    if (currentQIndex < 5) {
        showQuestion();
    } else {
        finishQuiz();
    }
}

function finishQuiz() {
    const msg = document.getElementById("quiz-message");
    const nextBtn = document.getElementById("next-quiz-btn");
    
    if (score >= 4) {
        msg.style.color = "green";
        msg.innerText = `बधाई हो! आपका स्कोर ${score}/5 है। अगला क्विज खुल गया!`;
        nextBtn.disabled = false;
        nextBtn.style.background = "#4CAF50";
        nextBtn.style.cursor = "pointer";
        nextBtn.innerText = "अगला क्विज खेलें 🔓";
    } else {
        msg.style.color = "red";
        msg.innerText = `आपका स्कोर ${score}/5 है। अगले क्विज के लिए आपको कम से कम 4 अंक लाना अनिवार्य है। फिर से प्रयास करें!`;
        // बटन लॉक ही रहेगा
    }
}

// क्विज शुरू करें
startNewQuiz();
     </script>
