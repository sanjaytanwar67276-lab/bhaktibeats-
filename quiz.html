<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री भक्ति सागर क्विज</title>
    <style>
        body { background-color: #000; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #quiz-container {
            width: 100%;
            max-width: 500px;
            background: #111;
            border: 3px solid #ff5722;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(255, 87, 34, 0.4);
        }

        .header-info { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 25px; }
        #q-text { font-size: 32px; margin-bottom: 30px; line-height: 1.4; color: #fff; font-weight: bold; }

        .option-btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
            background: #222;
            color: white;
            border: 2px solid #444;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .rules-box {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            font-size: 18px;
            color: #ffff00;
            border: 1px solid #333;
            text-align: left;
        }

        #result-screen { display: none; margin-top: 20px; }
        .retry-btn { background: #ff5722; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #next-level-btn {
            margin-top: 20px;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 40px;
            border: none;
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="header-info">
        <span id="q-count" style="color: #ffcc00;">प्रश्न: 1/5</span>
        <span style="color: #00ff00;">स्कोर: <span id="live-score">0</span></span>
    </div>

    <div id="quiz-area">
        <div id="q-text">सवाल लोड हो रहा है...</div>
        <div id="options-box"></div>
        
        <div class="rules-box">
            📢 <strong>नियम:</strong> हर सवाल 1 नंबर का है। अगले लेवल के लिए 5 में से 4 नंबर लाना अनिवार्य है।
        </div>
    </div>

    <div id="result-screen">
        <h2 id="res-msg" style="font-size: 28px;"></h2>
        <button class="retry-btn" onclick="startQuiz()">🔄 दोबारा प्रयास करें</button>
    </div>
</div>

<button id="next-level-btn" disabled>अगला लेवल 🔒</button>

<script>
// यहाँ आप अपने 100 सवाल इसी तरह जोड़ते जाएँ
const masterQuestions = [
    { q: "राम जी के पिता का नाम क्या था?", a: ["दशरथ", "जनक", "पांडु", "धृतराष्ट्र"], c: "दशरथ" },
    { q: "हनुमान जी किसके अवतार थे?", a: ["शिव", "विष्णु", "ब्रह्मा", "इंद्र"], c: "शिव" },
    { q: "गीता का उपदेश किसने दिया?", a: ["कृष्ण", "अर्जुन", "भीष्म", "करण"], c: "कृष्ण" },
    { q: "सूर्य पुत्र किसे कहा जाता है?", a: ["कर्ण", "अर्जुन", "भीम", "नकुल"], c: "कर्ण" },
    { q: "लंका का राजा कौन था?", a: ["रावण", "विभीषण", "कुम्भकरण", "बाली"], c: "रावण" },
    // और सवाल यहाँ जोड़ें...
];

let score = 0;
let currentIdx = 0;
let quizSet = [];

function startQuiz() {
    score = 0;
    currentIdx = 0;
    document.getElementById("live-score").innerText = "0";
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("next-level-btn").style.background = "#333";
    document.getElementById("next-level-btn").disabled = true;

    // 100 में से 5 रैंडम सवाल उठाना
    quizSet = masterQuestions.sort(() => Math.random() - 0.5).slice(0, 5);
    showQuestion();
}

function showQuestion() {
    let data = quizSet[currentIdx];
    document.getElementById("q-count").innerText = `प्रश्न: ${currentIdx + 1}/5`;
    document.getElementById("q-text").innerText = data.q;
    
    let optBox = document.getElementById("options-box");
    optBox.innerHTML = "";

    let shuffledOpts = [...data.a].sort(() => Math.random() - 0.5);
    shuffledOpts.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => checkAns(opt, data.c, btn);
        optBox.appendChild(btn);
    });
}

function checkAns(selected, correct, btn) {
    let btns = document.querySelectorAll(".option-btn");
    btns.forEach(b => b.disabled = true);

    if(selected === correct) {
        score++;
        document.getElementById("live-score").innerText = score;
        btn.style.background = "#28a745";
    } else {
        btn.style.background = "#dc3545";
    }

    setTimeout(() => {
        currentIdx++;
        if(currentIdx < 5) showQuestion();
        else finish();
    }, 1000);
}

function finish() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    let resMsg = document.getElementById("res-msg");
    let nextBtn = document.getElementById("next-level-btn");

    if(score >= 4) {
        resMsg.innerHTML = `<span style="color:#00ff00;">अदभुत! स्कोर: ${score}/5</span><br>अगला लेवल खुल गया!`;
        nextBtn.disabled = false;
        nextBtn.style.background = "#28a745";
        nextBtn.style.color = "white";
        nextBtn.innerText = "अगला लेवल खेलें 🔓";
    } else {
        resMsg.innerHTML = `<span style="color:#ff4444;">स्कोर: ${score}/5</span><br>पास होने के लिए 4 अंक चाहिए।`;
    }
}

startQuiz();
</script>

</body>
</html>
