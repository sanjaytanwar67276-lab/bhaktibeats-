<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री भक्ति सागर - Bhakti Sagar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>🚩 श्री भक्ति सागर 🚩</h1>
        </div>

        <div class="menu-grid">
            
            <div class="menu-item" onclick="window.location.href='puja.html'">
                <div class="icon">🔱</div>
                <div class="text">
                    <h3>संपूर्ण पूजा विधि</h3>
                    <p>सभी देवी-देवताओं की पूजन सामग्री और मंत्र</p>
                </div>
            </div>

            <div class="menu-item" onclick="window.location.href='fasts.html'">
                <div class="icon">🥣</div>
                <div class="text">
                    <h3>व्रत विधि और लाभ</h3>
                    <p>व्रत रखने के फायदे और सही विधि</p>
                </div>
            </div>

            <div class="menu-item" onclick="window.location.href='panchang.html'">
                <div class="icon">📅</div>
                <div class="text">
                    <h3>आज का पंचांग</h3>
                    <p>सटीक मुहूर्त, तिथि और नक्षत्र</p>
                </div>
            </div>

            <div class="menu-item" onclick="window.location.href='quiz.html'">
                <div class="icon">🧩</div>
                <div class="text">
                    <h3>भक्ति क्विज़ (100+)</h3>
                    <p>सनातन धर्म के बारे में अपना ज्ञान परखें</p>
                </div>
            </div>

            <div class="menu-item about-btn" onclick="window.location.href='about.html'">
                <div class="icon">ℹ️</div>
                <div class="text">
                    <h3>हमारे बारे में</h3>
                    <p>ऐप और डेवलपर की जानकारी</p>
                </div>
            </div>

        </div>

        <div class="share-container">
            <button class="whatsapp-btn" onclick="shareApp()">
                🟢 दोस्तों को WhatsApp पर भेजें
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
