<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>आज का सुविचार - भक्ति सागर</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Mukta', sans-serif;
    }

    body { 
      background: linear-gradient(135deg, #FFF8E1, #FFE082); 
      padding: 20px; 
      text-align: center; 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .header { 
      background: linear-gradient(90deg, #D84315, #FF7043); 
      color: white; 
      padding: 12px 30px; 
      border-radius: 50px; 
      font-size: 24px;
      font-weight: 700; 
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(216, 67, 21, 0.3);
    }
    
    /* Premium Quote Card */
    .quote-card { 
      background: linear-gradient(145deg, #00897B, #004D40); 
      color: white; 
      padding: 40px 30px; 
      border-radius: 25px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.25), inset 0 2px 5px rgba(255,255,255,0.2); 
      margin-bottom: 35px; 
      min-height: 200px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 24px; 
      font-weight: 600;
      line-height: 1.5; 
      border: 3px solid rgba(255,255,255,0.4);
      position: relative;
      max-width: 500px;
      width: 100%;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease;
    }

    /* Animation class for smooth text change */
    .fade-anim {
      opacity: 0;
      transform: translateY(10px);
    }

    /* Quote Mark Icons (Decorative) */
    .quote-card::before {
      content: '❝';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 50px;
      color: rgba(255,255,255,0.15);
    }
    .quote-card::after {
      content: '❞';
      position: absolute;
      bottom: -10px;
      right: 20px;
      font-size: 50px;
      color: rgba(255,255,255,0.15);
    }

    /* Buttons */
    .btn-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn { 
      padding: 16px; 
      border: none; 
      border-radius: 50px; 
      font-size: 18px; 
      font-weight: 700; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-share { 
      background: linear-gradient(90deg, #25D366, #128C7E); 
      color: white; 
      box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
    }
    
    .btn-next { 
      background: linear-gradient(90deg, #FF9800, #F57C00); 
      color: white;
      box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4);
    }

    .footer-note {
      font-size: 13px; 
      color: #666; 
      text-align: center; 
      margin-top: 40px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header">✨ आज का अनमोल वचन</div>

  <div class="quote-card" id="quote-text">
    </div>

  <div class="btn-container">
    <button class="btn btn-share" onclick="shareQuote()">
      🟢 WhatsApp पर शेयर करें
    </button>

    <button class="btn btn-next" onclick="nextQuote()">
      🔄 अगला सुविचार देखें
    </button>
  </div>

  <p class="footer-note">
    * सूचना: ये सुविचार महान ग्रंथों और महापुरुषों के विचारों पर आधारित हैं।
  </p>

  <script>
    const quotes = [
      "विश्वास वह शक्ति है जिससे उजड़ी हुई दुनिया में भी प्रकाश किया जा सकता है।",
      "परिवर्तन ही संसार का नियम है, जो हुआ वह अच्छा हुआ, जो हो रहा है वह अच्छा हो रहा है।",
      "फल की अभिलाषा छोड़कर कर्म करने वाला पुरुष ही अपने जीवन को सफल बनाता है।",
      "क्रोध से भ्रम पैदा होता है, भ्रम से बुद्धि व्यग्र होती है और जब बुद्धि व्यग्र होती है तब तर्क नष्ट हो जाता है।",
      "मन की शांति से बढ़कर इस दुनिया में कोई भी दौलत नहीं है।",
      "सत्य कभी नष्ट नहीं हो सकता, बस उसे स्वीकार करने में समय लगता है।",
      "इंसान अपने विश्वास से निर्मित होता है, जैसा वह विश्वास करता है वैसा ही वह बन जाता है।",
      "होइहि सोइ जो राम रचि राखा। को करि तर्क बढ़ावै साखा॥",
      "कर्म पर ही तुम्हारा अधिकार है, कर्म के फलों में कभी नहीं।",
      "जो मन को नियंत्रित नहीं करते, उनके लिए वह शत्रु के समान कार्य करता है।",
      "निराश न हों, कमजोर आपका वक्त है, आप या ईश्वर नहीं।",
      "समय से पहले और भाग्य से अधिक कभी किसी को कुछ नहीं मिलता।",
      "प्रभु की शरण में जाने से हर भय और चिंता दूर हो जाती है।",
      "धर्म केवल रास्ता दिखाता है, लेकिन मंज़िल तक तो कर्म ही पहुँचाता है।",
      "जब तक शरीर में प्राण हैं, तब तक सत्य और धर्म का मार्ग नहीं छोड़ना चाहिए।",
      "हर की गई प्रार्थना का उत्तर मिलता है, बस ईश्वर के समय की प्रतीक्षा करें।",
      "अच्छे कर्मों का फल कभी व्यर्थ नहीं जाता, वह सही समय पर जरूर मिलता है।",
      "अहंकार ज्ञान को निगल जाता है, और नम्रता ज्ञान को बढ़ाती है।",
      "सच्चा ज्ञान वही है जो इंसान को अंधकार से प्रकाश की ओर ले जाए।",
      "तुलसी भरोसे राम के, निर्भय हो के सोय। अनहोनी होनी नहीं, होनी होय सो होय॥",
      "संसार की सबसे बड़ी संपत्ति बुद्धि है, और सबसे बड़ा हथियार धैर्य है।",
      "बुरे समय में जो भगवान का हाथ थाम लेता है, उसे कोई नहीं गिरा सकता।",
      "जीवन में हर दिन एक नई शुरुआत है, इसे ईश्वर का आशीर्वाद मानकर जिएं।",
      "जिसका मन शांत है, उसके लिए पूरा ब्रह्मांड एक मंदिर है।",
      "सुख और दुख जीवन रूपी सिक्के के दो पहलू हैं, जो आते और जाते रहते हैं।",
      "सच्ची भक्ति वह है जिसमें कोई स्वार्थ न हो, केवल प्रेम और समर्पण हो।",
      "क्षमा वीरों का आभूषण है, जो क्षमा कर सकता है वह सबसे बलवान है।",
      "ईश्वर हर जगह मौजूद है, बस उसे देखने के लिए हृदय में प्रेम होना चाहिए।",
      "अपने कर्मों को ईमानदारी से करना ही सबसे बड़ी ईश्वर वंदना है।",
      "जो व्यक्ति दूसरों का भला सोचता है, ईश्वर हमेशा उसका भला करते हैं।",
      "कठिनाइयां हमें मजबूत बनाने के लिए आती हैं, तोड़ने के लिए नहीं।",
      "आत्मा न कभी जन्म लेती है और न कभी मरती है, वह अमर है।",
      "सच्चा मित्र वही है जो विपत्ति के समय आपका साथ न छोड़े।",
      "किसी का बुरा करके खुश मत होना, क्योंकि ईश्वर सब देख रहा है।",
      "जब चारों तरफ अंधेरा हो, तब भीतर के प्रकाश को जगाना चाहिए।",
      "विनम्रता ही सबसे बड़ा गुण है, यह इंसान को महान बनाती है।",
      "भरोसा अगर खुद पर हो तो ताकत बन जाता है, और ईश्वर पर हो तो चमत्कार।",
      "परमात्मा कभी किसी का भाग्य नहीं लिखते, जीवन के कदम ही भाग्य तय करते हैं।",
      "जो मनुष्य अपने क्रोध को वश में कर लेता है, उसने मानो पूरी दुनिया को जीत लिया।",
      "सकारात्मक सोच ही वह चाबी है जो सफलता के सारे ताले खोल देती है।",
      "दया और प्रेम से भरे शब्द कभी व्यर्थ नहीं जाते, वे दिलों पर राज करते हैं।",
      "हर सुबह एक नई उम्मीद लेकर आती है, बस उसे पहचानने की जरूरत है।",
      "जो बीत गया उस पर विलाप मत करो, जो आने वाला है उसकी चिंता मत करो, वर्तमान में जिओ।",
      "ईश्वर की न्याय चक्की धीमी जरूर चलती है, लेकिन पिसती बहुत बारीक है।",
      "सच्चा सुख बाहरी वस्तुओं में नहीं, बल्कि अपने भीतर की शांति में है।",
      "जिसने अपनी इच्छाओं पर विजय प्राप्त कर ली, उसने संसार पर विजय प्राप्त कर ली।",
      "अंधेरा चाहे कितना भी घना क्यों न हो, एक छोटा सा दीपक उसे चीर सकता है।",
      "जीवन का सबसे बड़ा सत्य मृत्यु है, इसलिए हर दिन को सार्थक बनाएं।",
      "आपका कर्म ही आपका धर्म है, इसे पूरी निष्ठा से निभाएं।",
      "जय श्री राम! ईश्वर के नाम में वह शक्ति है जो असंभव को भी संभव कर सकती है।"
    ];

    const quoteElement = document.getElementById("quote-text");
    const playStoreLink = "https://play.google.com/store/apps/details?id=com.appcollection.xbhaktisagar_10307"; 

    // Function to update text with smooth animation
    function updateQuoteUI(text) {
      quoteElement.classList.add("fade-anim");
      setTimeout(() => {
        quoteElement.innerText = text;
        quoteElement.classList.remove("fade-anim");
      }, 300); // 300ms delay matches CSS transition
    }

    // हर दिन के हिसाब से सुविचार सेट करने का फंक्शन
    function setDailyQuote() {
      let today = new Date();
      let dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
      let dailyIndex = dayOfYear % quotes.length;
      updateQuoteUI(`"${quotes[dailyIndex]}"`);
    }

    // यह फंक्शन रैंडम सुविचार दिखाता है
    function nextQuote() {
      let randomIndex = Math.floor(Math.random() * quotes.length);
      updateQuoteUI(`"${quotes[randomIndex]}"`);
    }

    // Advanced Share Function (Web Share API + WhatsApp Fallback)
    function shareQuote() {
      let text = quoteElement.innerText;
      let shareMessage = "🚩 *आज का सुविचार* 🚩\n\n" + text + "\n\nऐसे और अनमोल वचन, पूजा विधि और व्रत की जानकारी के लिए *भक्ति सागर* ऐप अभी डाउनलोड करें 👇\n" + playStoreLink;
      
      // Check if the device supports native sharing (Android WebViews usually do)
      if (navigator.share) {
        navigator.share({
          title: 'भक्ति सागर - सुविचार',
          text: shareMessage,
        }).catch(console.error);
      } else {
        // Fallback specifically for WhatsApp if Web Share is not supported
        let url = "whatsapp://send?text=" + encodeURIComponent(shareMessage);
        window.location.href = url;
      }
    }

    // जैसे ही पेज खुलेगा, सबसे पहले आज का सुविचार लोड हो जाएगा
    window.onload = setDailyQuote;

  </script>
</body>
</html>
