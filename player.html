<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhakti Sagar</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; color: #3e2723; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.8; font-size: 16px; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 श्री भक्ति संग्रह 🙏</h2>
    <div id="listContainer">Bhajan load ho rahe hain...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle"></h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics"></div>
</div>

<script>
    // 🔴 Aapki Sheet ID aur Tab ka asli naam 🔴
    const sheetId = "1_LzCifHXzlqmX7UWL8mBvJcax62E2adwKvPoELo13To";
    const sheetName = "Khatu Shyam"; // Aapne sheet ka naam ye rakha hai
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;

    const urlParams = new URLSearchParams(window.location.search);
    const catSearch = (urlParams.get('cat') || "").toLowerCase().trim();
    const typeSearch = (urlParams.get('type') || "").toLowerCase().trim();

    async function loadData() {
        try {
            const response = await fetch(csvUrl + "&t=" + Date.now());
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1); // Pehli line (header) chhodo
            
            let allItems = [];
            rows.forEach(row => {
                if(!row.trim()) return;
                
                // CSV columns ko sahi se split karein
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                if (cols.length >= 5) {
                    const rowCat = cols[1].toLowerCase();
                    const rowType = (cols[5] || "").toLowerCase();

                    // Agar Category aur Type match karte hain
                    if (rowCat.includes(catSearch) && rowType.includes(typeSearch)) {
                        allItems.push({
                            title: cols[2],
                            audio: cols[3],
                            lyrics: cols[4].replace(/\\n/g, '\n')
                        });
                    }
                }
            });
            renderList(allItems);
        } catch (e) {
            document.getElementById('listContainer').innerText = "Data load nahi ho paya.";
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (items.length === 0) {
            container.innerHTML = "<b>Koi bhajan nahi mila!</b><br><small>Sheet mein check karein.</small>";
            return;
        }
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span>▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
