<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर - प्लेयर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; color: #3e2723; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.8; font-size: 16px; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 श्री भक्ति संग्रह 🙏</h2>
    <div id="listContainer">डेटा लोड हो रहा है... कृपया प्रतीक्षा करें।</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle"></h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics"></div>
</div>

<script>
    // 🔴 100% लाइव और सुरक्षित API लिंक (पब्लिश अटका हो तो भी काम करेगा) 🔴
    const sheetId = "1_LzCifHXzlqmX7UWL8mBvJcax62E2adwKvPoELo13To";
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=0`;

    const urlParams = new URLSearchParams(window.location.search);
    const catSearch = (urlParams.get('cat') || "").toLowerCase().trim();
    const typeSearch = (urlParams.get('type') || "").toLowerCase().trim();

    // अगर लिंक में कुछ न हो तो डिफ़ॉल्ट रूप से ये दिखाएगा
    const finalCat = catSearch ? catSearch : "khatu shyam";
    const finalType = typeSearch ? typeSearch : "aarti";

    document.getElementById('pageMainTitle').innerText = `🙏 लोड हो रहा है 🙏`;

    async function loadData() {
        try {
            const response = await fetch(csvUrl + "&t=" + Date.now());
            const text = await response.text();
            
            const rows = text.split(/\r?\n/);
            let allItems = [];

            // पहली लाइन हेडर है, इसलिए 1 से शुरू
            for (let i = 1; i < rows.length; i++) {
                const rowText = rows[i];
                if(!rowText.trim()) continue;

                // 🔴 मास्टरस्ट्रोक: फालतू स्पेस हटाकर पूरी लाइन में शब्द ढूंढना 🔴
                const rowLower = rowText.toLowerCase().replace(/\s+/g, ' '); 
                
                if (rowLower.includes(finalCat) && rowLower.includes(finalType)) {
                    // CSV कोमा स्प्लिट
                    const cols = rowText.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                    
                    if (cols.length >= 4) {
                        allItems.push({
                            title: cols[2] || "Title Not Found",
                            audio: cols[3] || "",
                            lyrics: (cols[4] || "").replace(/\\n/g, '\n')
                        });
                    }
                }
            }
            renderList(allItems);
        } catch (e) {
            document.getElementById('listContainer').innerHTML = `<b>सर्वर से जुड़ने में समस्या!</b>`;
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        
        if (items.length === 0) {
            container.innerHTML = `<b>कोई डेटा नहीं मिला।</b><br><small>कृपया अपनी शीट चेक करें।</small>`;
            return;
        }

        // नाम सेट करें
        document.getElementById('pageMainTitle').innerText = `🙏 ${items[0].title.split(' ')[1] || 'भक्ति'} संग्रह 🙏`;

        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span style="color:#d35400; font-size:20px;">▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
