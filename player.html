<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर प्लेयर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; }
        .list-box { background: white; padding: 20px; margin-bottom: 12px; border-radius: 15px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics-container { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.8; }
    </style>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 श्री भक्ति संग्रह 🙏</h2>
    <div id="listContainer">डेटा लोड हो रहा है...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle">शीर्षक</h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics-container"></div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSw465ooS9QfJ9h6M7UIxIt2giu_XtwS-FLnNrKDP0-XoR_B1YIQylYRILKiMDNJbcBf0Ujn7Ea3x7E/pub?gid=0&single=true&output=csv";

    const urlParams = new URLSearchParams(window.location.search);
    const selectedCat = (urlParams.get('cat') || "").toLowerCase().trim();
    const selectedType = (urlParams.get('type') || "").toLowerCase().trim();

    async function loadData() {
        try {
            // रैंडम नंबर ताकि ब्राउज़र हमेशा ताज़ा डेटा लाए
            const response = await fetch(csvUrl + "?v=" + Math.random());
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            let allItems = [];
            rows.forEach(row => {
                if(!row.trim()) return;
                
                // कोमा स्प्लिट
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());

                if (cols.length >= 4) {
                    // पूरी लाइन में शब्द ढूंढना (सबसे सेफ तरीका)
                    const rowText = row.toLowerCase();
                    if (rowText.includes(selectedCat) && rowText.includes(selectedType)) {
                        allItems.push({
                            title: cols[2],
                            audio: cols[3],
                            lyrics: (cols[4] || "").replace(/\\n/g, '\n')
                        });
                    }
                }
            });
            renderList(allItems);
        } catch (e) {
            document.getElementById('listContainer').innerText = "सर्वर एरर!";
        }
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        if (items.length === 0) {
            container.innerHTML = `<b>कोई डेटा नहीं मिला।</b><br><small>URL: ${selectedCat} | ${selectedType}</small>`;
            return;
        }
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span>▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
