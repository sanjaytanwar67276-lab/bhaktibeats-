<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भक्ति सागर - प्लेयर</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 15px; text-align: center; color: #3e2723; }
        .list-box { background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 6px solid #d35400; cursor: pointer; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        #playerView { display: none; background: white; padding: 20px; border-radius: 15px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .back-btn { background: #d35400; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .lyrics { white-space: pre-wrap; text-align: left; background: #fffaf0; padding: 15px; border-radius: 10px; border: 1px dashed #d35400; margin-top: 15px; line-height: 1.8; font-size: 16px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="listView">
    <h2 id="pageMainTitle">🙏 श्री भक्ति संग्रह 🙏</h2>
    <div id="listContainer">भजन लोड हो रहे हैं...</div>
</div>

<div id="playerView">
    <button class="back-btn" onclick="goBack()">⬅ वापस लिस्ट पर</button>
    <h2 id="playerTitle"></h2>
    <audio id="myAudio" controls style="width: 100%;"><source id="audioSource" src="" type="audio/mpeg"></audio>
    <div id="playerLyrics" class="lyrics"></div>
</div>

<script>
    const sheetId = "1_LzCifHXzlqmX7UWL8mBvJcax62E2adwKvPoELo13To";
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

    const urlParams = new URLSearchParams(window.location.search);
    const catSearch = (urlParams.get('cat') || "khatu").toLowerCase().trim();
    const typeSearch = (urlParams.get('type') || "aarti").toLowerCase().trim();

    document.getElementById('pageMainTitle').innerText = "🙏 लोड हो रहा है 🙏";

    function loadData() {
        // PapaParse अपने आप पूरा डेटा सही से लाएगा
        Papa.parse(csvUrl + "&t=" + Date.now(), {
            download: true,
            complete: function(results) {
                const rows = results.data;
                let allItems = [];

                // पहली लाइन हेडिंग है, इसलिए 1 से शुरू करेंगे
                for(let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    
                    // कम से कम 6 कॉलम होने चाहिए (A से F तक)
                    if(cols.length >= 6) {
                        const rowCat = (cols[1] || "").toLowerCase();
                        const rowType = (cols[5] || "").toLowerCase();

                        // अगर कैटेगरी और टाइप मैच करते हैं
                        if(rowCat.includes(catSearch) && rowType.includes(typeSearch)) {
                            allItems.push({
                                title: cols[2] || "बिना शीर्षक",
                                audio: cols[3] || "",
                                lyrics: cols[4] || "लिरिक्स उपलब्ध नहीं हैं।"
                            });
                        }
                    }
                }
                renderList(allItems);
            },
            error: function(err) {
                document.getElementById('listContainer').innerHTML = "<b>नेटवर्क एरर!</b>";
            }
        });
    }

    function renderList(items) {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        
        if (items.length === 0) {
            container.innerHTML = "<b>कोई डेटा नहीं मिला!</b><br><small>URL चेक करें या शीट रिफ्रेश करें।</small>";
            return;
        }

        document.getElementById('pageMainTitle').innerText = "🙏 " + (urlParams.get('cat') || "भक्ति") + " 🙏";

        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-box';
            div.onclick = () => {
                document.getElementById('listView').style.display = 'none';
                document.getElementById('playerView').style.display = 'block';
                document.getElementById('playerTitle').innerText = item.title;
                document.getElementById('playerLyrics').innerText = item.lyrics;
                
                const audio = document.getElementById('myAudio');
                document.getElementById('audioSource').src = item.audio;
                audio.load();
                audio.play();
            };
            div.innerHTML = `<b>${item.title}</b> <span style="color:#d35400; font-size:20px;">▶</span>`;
            container.appendChild(div);
        });
    }

    function goBack() {
        document.getElementById('playerView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        document.getElementById('myAudio').pause();
    }

    loadData();
</script>
</body>
</html>
