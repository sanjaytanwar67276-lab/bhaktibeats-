<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 श्रीमद्भगवद गीता - संपूर्ण ज्ञान</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1a1a1a 0%, #4a148c 100%); color: #fff; padding: 20px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; background: linear-gradient(to right, #ffeb3b, #ff9800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #gitaContainer { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .gita-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s; }
        .gita-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.15); }
        .chapter-title { font-weight: 700; color: #ffeb3b; margin-bottom: 10px; }
        .shlok { font-size: 1.1rem; margin-bottom: 10px; line-height: 1.5; color: #fff; }
        .meaning { font-size: 0.9rem; margin-bottom: 15px; color: #ccc; }
        audio { width: 100%; height: 40px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>📖 श्रीमद्भगवद गीता</h1>
</div>

<div id="gitaContainer"></div>

<script>
    const gitaData = [
        {title:"अध्याय 1", shlok:"कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।", meaning:"कर्म करो, फल की चिंता मत करो।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779956440/Generated-Audio-May-28-2026-1-48_djp972.mp3"},
        {title:"अध्याय 2", shlok:"न जायते म्रियते वा कदाचित्।", meaning:"आत्मा अजर-अमर है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779957225/Generated-Audio-May-28-2026-2-01_ze8fya.mp3"},
        {title:"अध्याय 3", shlok:"स्वधर्मे निधनं श्रेयः परधर्मो भयावहः।", meaning:"अपने धर्म का पालन श्रेष्ठ है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779957593/Generated-Audio-May-28-2026-2-08_ne65ud.mp3"},
        {title:"अध्याय 4", shlok:"यदा यदा हि धर्मस्य ग्लानिर्भवति भारत।", meaning:"धर्म की रक्षा के लिए भगवान अवतार लेते हैं।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779957971/Generated-Audio-May-28-2026-2-13_x2xkhw.mp3"},
        {title:"अध्याय 5", shlok:"शान्तिरन्तरात्मा।", meaning:"मन की शांति ही सच्चा सुख है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779958463/Generated_Audio_May_28_2026_-_2_20PM_nwbyqy.wav"},
        {title:"अध्याय 6", shlok:"योगः कर्मसु कौशलम्।", meaning:"योग से ही कर्म में कुशलता आती है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779958793/Generated-Audio-May-28-2026-2-27_nwvhaz.mp3"},
        {title:"अध्याय 7", shlok:"मन्मना भव मद्भक्तो।", meaning:"मेरा भक्त बनकर मुझे ही स्मरण करो।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779959102/Generated_Audio_May_28_2026_-_2_33PM_orsm3x.wav"},
        {title:"अध्याय 8", shlok:"अन्तकाले च मामेव स्मरन्।", meaning:"अंतिम समय में मेरा स्मरण मोक्ष देता है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779959354/Generated-Audio-May-28-2026-2-37_fzh464.mp3"},
        {title:"अध्याय 9", shlok:"राजविद्या राजगुह्यं।", meaning:"यह ज्ञान सबसे पवित्र और गोपनीय है।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779959787/Generated-Audio-May-28-2026-2-44_vquxsn.mp3"},
        {title:"अध्याय 10", shlok:"अहमात्मा गुडाकेश।", meaning:"मैं ही सभी जीवों के हृदय में स्थित हूँ।", audio:"https://res.cloudinary.com/dbutl9qr6/video/upload/v1779960022/Generated-Audio-May-28-2026-2-48_eqswul.mp3"},
        {title:"अध्याय 11", shlok:"दिवि सूर्यसहस्रस्य भवेद्युगपदुत्थिता।", meaning:"विश्वरूप का दर्शन अत्यंत तेजस्वी है।", audio:""},
        {title:"अध्याय 12", shlok:"मय्यावेश्य मनो ये मां।", meaning:"जो मुझमें मन लगाकर भक्ति करते हैं, वे श्रेष्ठ हैं।", audio:""},
        {title:"अध्याय 13", shlok:"क्षेत्रज्ञं चापि मां विद्धि।", meaning:"शरीर क्षेत्र है और आत्मा उसका ज्ञाता है।", audio:""},
        {title:"अध्याय 14", shlok:"सत्त्वं रजस्तम इति गुणाः।", meaning:"संसार तीन गुणों से संचालित है।", audio:""},
        {title:"अध्याय 15", shlok:"ऊर्ध्वमूलमधःशाखम्।", meaning:"यह संसार एक विशाल वृक्ष के समान है।", audio:""},
        {title:"अध्याय 16", shlok:"अभयं सत्त्वसंशुद्धिः।", meaning:"दैवी गुण मोक्ष का मार्ग प्रशस्त करते हैं।", audio:""},
        {title:"अध्याय 17", shlok:"श्रद्धामयोऽयं पुरुषः।", meaning:"मनुष्य जैसी श्रद्धा रखता है, वैसा ही बन जाता है।", audio:""},
        {title:"अध्याय 18", shlok:"सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।", meaning:"सब कुछ छोड़कर मेरी शरण में आओ।", audio:""}
    ];

    const container = document.getElementById("gitaContainer");

    gitaData.forEach(item => {
        const card = document.createElement("div");
        card.className = "gita-card";
        
        // चेक करें कि ऑडियो फाइल मौजूद है या नहीं
        const audioTag = item.audio ? `<audio controls class="gita-audio"><source src="${item.audio}" type="audio/mpeg"></audio>` : `<p style="color:#666; font-size:0.8rem; margin-top:10px;">ऑडियो जल्द उपलब्ध होगा</p>`;
        
        card.innerHTML = `
            <div class="chapter-title">${item.title}</div>
            <div class="shlok">"${item.shlok}"</div>
            <div class="meaning">${item.meaning}</div>
            ${audioTag}
        `;
        container.appendChild(card);
    });

    // Global Audio Controller
    document.addEventListener('play', function(e) {
        const audios = document.querySelectorAll('.gita-audio');
        audios.forEach(audio => {
            if (audio !== e.target) {
                audio.pause();
            }
        });
    }, true);
</script>

</body>
</html>
