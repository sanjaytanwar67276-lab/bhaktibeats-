<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📖 गीता का ज्ञान</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

/* =============================== */
/* DIVINE GITA PAGE */
/* =============================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#ffe082 0%,
#ffcc80 20%,
#ffab91 40%,
#ce93d8 60%,
#81d4fa 80%,
#80cbc4 100%
);

background-size:400% 400%;

animation:bgMove 14s ease infinite;

min-height:100vh;

padding:20px;

overflow-x:hidden;

position:relative;

}

/* BG ANIMATION */

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* GLOW */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:

radial-gradient(circle at top left,
rgba(255,255,255,0.3),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(255,255,255,0.2),
transparent 30%),

radial-gradient(circle at center,
rgba(255,255,255,0.12),
transparent 40%);

z-index:-2;

animation:glow 8s infinite alternate;

}

@keyframes glow{

0%{
transform:scale(1);
}

100%{
transform:scale(1.08);
}

}

/* PARTICLES */

body::after{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:
radial-gradient(rgba(255,255,255,0.35) 2px, transparent 2px);

background-size:35px 35px;

opacity:0.25;

z-index:-1;

animation:particles 20s linear infinite;

}

@keyframes particles{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-80px);
}

}

/* HEADER */

.header{

text-align:center;

font-size:44px;

font-weight:900;

margin-bottom:35px;

animation:headerGlow 3s infinite alternate;

}

.gita-text{

background:
linear-gradient(
90deg,
#fff176,
#ffeb3b,
#ff9800,
#ff5722,
#ffd54f
);

background-size:300% 300%;

animation:gitaGlow 5s linear infinite;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 10px rgba(255,152,0,0.7),

0 0 20px rgba(255,87,34,0.6),

0 5px 15px rgba(0,0,0,0.5);

}

@keyframes gitaGlow{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

@keyframes headerGlow{

0%{
transform:scale(1);
}

100%{
transform:scale(1.03);
}

}

/* CARD */

.gita-card{

background:
linear-gradient(
145deg,
rgba(255,255,255,0.22),
rgba(255,255,255,0.08)
);

backdrop-filter:blur(18px);

border:2px solid rgba(255,255,255,0.25);

border-radius:32px;

padding:24px;

margin-bottom:28px;

box-shadow:

0 18px 40px rgba(0,0,0,0.25),

inset 0 2px 4px rgba(255,255,255,0.3);

transition:0.4s;

position:relative;

overflow:hidden;

}

.gita-card::before{

content:"";

position:absolute;

top:-50%;
right:-20%;

width:220px;
height:220px;

background:
rgba(255,255,255,0.15);

transform:rotate(35deg);

border-radius:50%;

}

.gita-card:hover{

transform:
translateY(-6px)
scale(1.02);

box-shadow:
0 25px 50px rgba(0,0,0,0.3);

}

/* TITLE */

.chapter-title{

font-size:25px;

font-weight:900;

color:#4e342e;

margin-bottom:15px;

line-height:1.4;

text-shadow:

0 2px 3px rgba(255,255,255,0.6),

0 3px 8px rgba(0,0,0,0.18);

}

/* SHLOK */

.shlok{

font-size:17px;

font-weight:800;

line-height:2;

color:#bf360c;

background:
linear-gradient(
90deg,
rgba(255,241,118,0.6),
rgba(255,204,128,0.6)
);

padding:16px;

border-radius:18px;

margin-bottom:18px;

box-shadow:
0 6px 15px rgba(0,0,0,0.12);

}

/* MEANING */

.meaning{

font-size:15px;

font-weight:700;

line-height:1.9;

color:#5d4037;

margin-bottom:20px;

}

/* HIGHLIGHT */

.highlight{

color:#d84315;

font-weight:900;

background:
linear-gradient(
90deg,
#fff176,
#ffcc80
);

padding:2px 8px;

border-radius:8px;

}

/* AUDIO */

audio{

width:100%;

border-radius:50px;

background:
linear-gradient(
90deg,
#ff6f00,
#ff1744
);

box-shadow:
0 12px 25px rgba(0,0,0,0.3);

}

audio::-webkit-media-controls-panel{

background:
linear-gradient(
90deg,
#ff6f00,
#ff1744
);

}

/* MOBILE */

@media(max-width:480px){

.header{
font-size:32px;
}

.chapter-title{
font-size:21px;
}

.shlok{
font-size:15px;
}

.meaning{
font-size:14px;
}

.gita-card{
padding:20px;
}

}

</style>

</head>

<body>

<div class="header">
📖 <span class="gita-text">गीता का ज्ञान</span>
</div>

<div id="gitaContainer"></div>

<script>

},

{
title:"अध्याय 18 - मोक्ष संन्यास योग",

}

];

const container =
document.getElementById("gitaContainer");

gitaData.forEach(item=>{

container.innerHTML += `

<div class="gita-card">

<div class="chapter-title">
${item.title}
</div>

<div class="shlok">
🕉️ ${item.shlok}
</div>

<div class="meaning">
${item.meaning}
</div>

<audio controls preload="none" controlsList="nodownload">
<source src="${item.audio}" type="audio/mpeg">
</audio>

</div>

`;

});

</script>
<script>

let currentAudio = null;

document.addEventListener("play", function(e){

if(e.target.tagName === "AUDIO"){

if(currentAudio && currentAudio !== e.target){

currentAudio.pause();

}

currentAudio = e.target;

}

}, true);

</script>
</body>

</html>
