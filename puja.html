<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पूजा सूची - श्री भक्ति सागर</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-container { position: sticky; top: 0; background: #fffaf5; padding: 10px; z-index: 100; }
        .search-box { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #ff8c00; outline: none; box-sizing: border-box; }
        .list-container { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .section-title { grid-column: span 2; padding: 10px; background: #ff8c00; color: white; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 15px; }
        .item-btn { background: white; padding: 15px 5px; border-radius: 10px; text-align: center; border: 1px solid #ffe0b2; font-size: 14px; font-weight: bold; color: #d35400; cursor: pointer; }
    </style>
</head>
<body>
    <div class="search-container"><input type="text" id="searchInput" class="search-box" placeholder="🔍 भगवान खोजें..." onkeyup="filterMenu()"></div>
    <div class="list-container" id="menuGrid">
        <div class="section-title">प्रमुख देवता एवं पूजा विधि</div>
        <div class="item-btn" onclick="speak('शिव पूजा विधि'); location.href='shiv.html'">भगवान शिव</div>
        <div class="item-btn" onclick="speak('विष्णु पूजा विधि'); location.href='vishnu.html'">भगवान विष्णु</div>
        <div class="item-btn" onclick="speak('ब्रह्मा पूजा विधि'); location.href='brahma.html'">भगवान ब्रह्मा</div>
        <div class="item-btn" onclick="speak('गणेश पूजा विधि'); location.href='ganesh.html'">श्री गणेश</div>
        <div class="item-btn" onclick="speak('हनुमान पूजा विधि'); location.href='hanuman.html'">हनुमान जी</div>
        <div class="section-title">दशावतार एवं पूजा विधि</div>
        <div class="item-btn" onclick="speak('मत्स्य अवतार'); location.href='matsya.html'">1. मत्स्य अवतार</div>
        <div class="item-btn" onclick="speak('कूर्म अवतार'); location.href='kurma.html'">2. कूर्म अवतार</div>
        <div class="item-btn" onclick="speak('वराह अवतार'); location.href='varah.html'">3. वराह अवतार</div>
        <div class="item-btn" onclick="speak('नरसिंह अवतार'); location.href='narsingh.html'">4. नरसिंह अवतार</div>
        <div class="item-btn" onclick="speak('वामन अवतार'); location.href='vaman.html'">5. वामन अवतार</div>
        <div class="item-btn" onclick="speak('परशुराम अवतार'); location.href='parshuram.html'">6. परशुराम</div>
        <div class="item-btn" onclick="speak('राम अवतार'); location.href='rama.html'">7. श्री राम</div>
        <div class="item-btn" onclick="speak('कृष्ण अवतार'); location.href='krishna.html'">8. श्री कृष्ण</div>
        <div class="item-btn" onclick="speak('बुद्ध अवतार'); location.href='buddha.html'">9. बुद्ध</div>
        <div class="item-btn" onclick="speak('कल्कि अवतार'); location.href='kalki.html'">10. कल्कि</div>
        </div>
    <button class="whatsapp-btn" style="background:#444; width:90%; margin:20px auto; display:block;" onclick="location.href='index.html'">🏠 मुख्य मेनू</button>
    <script src="script.js"></script>
    <script>
        function filterMenu() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementsByClassName('item-btn');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
